<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repo-copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* === ART DIRECTION ===
   Concept: developer tool, mobile-first, dense
   Palette: Nexus dark surfaces, Hydra Teal accent
   Typography: Satoshi body only
   Density: maximum, compact, thumb-optimized */

:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-surface-offset-2: #edeae5;
  --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-active: #0f3638;
  --color-primary-highlight: #cedcd8;
  --color-error: #a12c7b;
  --color-success: #437a22;
  --color-warning: #964219;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'Satoshi', 'Inter', sans-serif;
}

[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-surface-offset-2: #22211f;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-active: #1a626b;
  --color-primary-highlight: #313b3b;
  --color-error: #d163a7;
  --color-success: #6daa45;
  --color-warning: #bb653b;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a; --color-surface-offset-2: #22211f;
    --color-surface-dynamic: #2d2c2a; --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
    --color-text-inverse: #2b2a28; --color-primary: #4f98a3; --color-primary-hover: #227f8b;
    --color-primary-active: #1a626b; --color-primary-highlight: #313b3b;
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2); --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
    --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-bg); overflow-x: hidden; }
img, svg { display: block; max-width: 100%; }
input, button, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
a, button, [role="button"] { transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive), opacity var(--transition-interactive); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }

/* === LAYOUT === */
.app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* HEADER */
.header { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-border); flex-shrink: 0; min-height: 52px; }
.header-logo { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
.header-logo svg { width: 24px; height: 24px; color: var(--color-primary); }
.header-title { font-size: var(--text-sm); font-weight: 700; color: var(--color-text); letter-spacing: -0.01em; }
.header-spacer { flex: 1; }
.theme-toggle { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border-radius: var(--radius-md); }
.theme-toggle:hover { color: var(--color-text); background: var(--color-surface-dynamic); }
.theme-toggle:active { background: var(--color-surface-offset-2); }

/* TABS */
.tabs { display: flex; background: var(--color-surface); border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
.tab { flex: 1; padding: var(--space-3) var(--space-2); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); border-bottom: 2px solid transparent; text-align: center; min-height: 44px; display: flex; align-items: center; justify-content: center; gap: var(--space-2); }
.tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.tab:hover:not(.active) { color: var(--color-text); background: var(--color-surface-dynamic); }
.tab:active { background: var(--color-surface-offset-2); }
.tab-badge { background: var(--color-primary); color: var(--color-text-inverse); font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: var(--radius-full); display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }

/* MAIN CONTENT */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.panel { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; flex-direction: column; }
.panel.active { display: flex; }

/* SECTIONS */
.section { padding: var(--space-4); border-bottom: 1px solid var(--color-divider); }
.section:last-child { border-bottom: none; }
.section-label { font-size: var(--text-xs); font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-3); }

/* INPUTS */
.input-row { display: flex; gap: var(--space-2); }
.input { flex: 1; background: var(--color-surface-offset); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3) var(--space-3); font-size: var(--text-sm); color: var(--color-text); min-height: 44px; transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
.input::placeholder { color: var(--color-text-faint); }
.input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-highlight); }
.input-full { width: 100%; }
textarea.input { min-height: 80px; resize: vertical; }
select.input { cursor: pointer; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); font-weight: 600; border-radius: var(--radius-md); min-height: 44px; white-space: nowrap; }
.btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:active { background: var(--color-primary-active); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--color-surface-dynamic); color: var(--color-text); border: 1px solid var(--color-border); }
.btn-secondary:hover { background: var(--color-surface-offset-2); }
.btn-secondary:active { background: var(--color-border); }
.btn-ghost { color: var(--color-text-muted); padding: var(--space-2) var(--space-3); min-height: 36px; border-radius: var(--radius-md); }
.btn-ghost:hover { color: var(--color-text); background: var(--color-surface-dynamic); }
.btn-ghost:active { background: var(--color-surface-offset-2); }
.btn-icon { width: 44px; height: 44px; padding: 0; border-radius: var(--radius-md); flex-shrink: 0; }
.btn-sm { padding: var(--space-2) var(--space-3); min-height: 36px; font-size: var(--text-xs); }
.btn-full { width: 100%; }

/* FILTER BUTTONS */
.filter-btn { padding: var(--space-2) var(--space-3); min-height: 36px; font-size: var(--text-xs); font-weight: 600; border-radius: var(--radius-md); background: var(--color-surface-dynamic); color: var(--color-text-muted); border: 1px solid var(--color-border); transition: background var(--transition-interactive), color var(--transition-interactive), border-color var(--transition-interactive); }
.filter-btn:hover { background: var(--color-surface-offset-2); color: var(--color-text); }
.filter-btn.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
.filter-btn.active:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }

/* REPO INFO CARD */
.repo-card { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); }
.repo-card-name { font-size: var(--text-base); font-weight: 700; color: var(--color-text); margin-bottom: var(--space-1); }
.repo-card-desc { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-3); line-height: 1.5; }
.repo-meta { display: flex; flex-wrap: wrap; gap: var(--space-3); }
.repo-meta-item { display: flex; align-items: center; gap: var(--space-1); font-size: var(--text-xs); color: var(--color-text-muted); }
.repo-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }

/* STATUS */
.status { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-3); border-radius: var(--radius-md); font-size: var(--text-xs); }
.status-loading { background: color-mix(in oklch, var(--color-primary) 10%, var(--color-surface)); color: var(--color-primary); }
.status-error { background: color-mix(in oklch, var(--color-error) 10%, var(--color-surface)); color: var(--color-error); }
.status-success { background: color-mix(in oklch, var(--color-success) 10%, var(--color-surface)); color: var(--color-success); }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MAILBOX PINNED SECTION */
.mailbox-section { background: color-mix(in oklch, var(--color-primary) 6%, var(--color-surface)); border-bottom: 1px solid var(--color-divider); flex-shrink: 0; }
.mailbox-header { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-3) var(--space-4); cursor: pointer; min-height: 40px; }
.mailbox-header:hover { background: color-mix(in oklch, var(--color-primary) 10%, var(--color-surface)); }
.mailbox-header svg { width: 14px; height: 14px; color: var(--color-primary); flex-shrink: 0; }
.mailbox-header-label { font-size: var(--text-xs); font-weight: 700; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
.mailbox-toggle { width: 16px; height: 16px; color: var(--color-primary); transition: transform 180ms; }
.mailbox-toggle.open { transform: rotate(90deg); }
.mailbox-list { padding: 0 var(--space-4) var(--space-3); display: none; flex-direction: column; gap: var(--space-1); }
.mailbox-list.open { display: flex; }
.mailbox-item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); cursor: pointer; min-height: 36px; }
.mailbox-item:hover { background: color-mix(in oklch, var(--color-primary) 12%, var(--color-surface)); }
.mailbox-item svg { width: 14px; height: 14px; color: var(--color-primary); flex-shrink: 0; }
.mailbox-item-path { flex: 1; font-size: var(--text-xs); color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mailbox-item-size { font-size: 10px; color: var(--color-text-faint); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.mailbox-item-cb { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; flex-shrink: 0; }
.mailbox-empty { font-size: var(--text-xs); color: var(--color-text-faint); padding: var(--space-2) var(--space-3); }

/* FILE TREE */
.file-tree-toolbar { display: flex; flex-wrap: wrap; gap: var(--space-2); padding: var(--space-3) var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-divider); align-items: center; flex-shrink: 0; }
.file-tree-toolbar .toolbar-left { display: flex; gap: var(--space-2); flex: 1; flex-wrap: wrap; align-items: center; }
.toolbar-divider { width: 1px; height: 20px; background: var(--color-border); flex-shrink: 0; }
.filter-summary { font-size: var(--text-xs); color: var(--color-primary); font-weight: 600; padding: var(--space-1) var(--space-2); background: var(--color-primary-highlight); border-radius: var(--radius-sm); display: none; }
.file-count { font-size: var(--text-xs); color: var(--color-text-muted); align-self: center; flex-shrink: 0; }

.tree-container { flex: 1; overflow-y: auto; padding: var(--space-2); }
.tree-node { user-select: none; }
.tree-item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-2); border-radius: var(--radius-sm); min-height: 36px; cursor: pointer; }
.tree-item:hover { background: var(--color-surface-dynamic); }
.tree-item:active { background: var(--color-surface-offset-2); }
.tree-toggle { width: 16px; height: 16px; flex-shrink: 0; color: var(--color-text-faint); display: flex; align-items: center; justify-content: center; transition: transform 180ms; }
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle-spacer { width: 16px; flex-shrink: 0; }
.tree-checkbox { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--color-primary); cursor: pointer; }
.tree-icon { width: 16px; height: 16px; flex-shrink: 0; }
.tree-name { flex: 1; font-size: var(--text-sm); color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-name.dir { color: var(--color-text-muted); font-weight: 500; }
.tree-size { font-size: 10px; color: var(--color-text-faint); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.tree-children { padding-left: var(--space-5); display: none; }
.tree-children.open { display: block; }

/* FILE PREVIEW SHEET */
.sheet-backdrop { position: fixed; inset: 0; background: oklch(0.1 0 0 / 0.6); z-index: 100; display: none; backdrop-filter: blur(2px); }
.sheet-backdrop.open { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85dvh; background: var(--color-surface); border-radius: var(--radius-xl) var(--radius-xl) 0 0; z-index: 101; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-lg); }
.sheet.open { transform: translateY(0); }
.sheet-header { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4); border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
.sheet-title { flex: 1; font-size: var(--text-sm); font-weight: 600; color: var(--color-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sheet-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); border-radius: var(--radius-full); flex-shrink: 0; }
.sheet-close:hover { background: var(--color-surface-dynamic); color: var(--color-text); }
.sheet-close:active { background: var(--color-surface-offset-2); }
.sheet-body { flex: 1; overflow-y: auto; padding: var(--space-4); }
.code-block { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; line-height: 1.6; color: var(--color-text); white-space: pre-wrap; word-break: break-word; background: var(--color-surface-offset); padding: var(--space-4); border-radius: var(--radius-md); border: 1px solid var(--color-border); }

/* EXPORT SECTION */
.export-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.export-info { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: var(--space-3); padding: var(--space-3); background: var(--color-surface-offset); border-radius: var(--radius-md); line-height: 1.6; }
.export-info strong { color: var(--color-text); }

/* =====================================================
   CHAT PANEL — Phase 3 layout (fixed height columns)
   Key: min-height:0 on .chat-messages prevents flex
   children from overflowing their parent container.
   ===================================================== */
.chat-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* STATUS BAR — always 44px, never collapses */
.chat-config-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 0 var(--space-4);
  height: 44px;
  min-height: 44px;
  flex-shrink: 0;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
  user-select: none;
}
.chat-config-bar:hover { background: var(--color-surface-dynamic); }
.chat-config-bar:active { background: var(--color-surface-offset-2); }

.config-bar-dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--color-text-faint);
  flex-shrink: 0;
  transition: background var(--transition-interactive);
}
.config-bar-dot.ready { background: var(--color-success); }

.config-bar-label {
  flex: 1;
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.config-bar-tokens {
  font-size: var(--text-xs);
  color: var(--color-primary);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.config-bar-chevron {
  width: 16px;
  height: 16px;
  color: var(--color-text-faint);
  flex-shrink: 0;
  transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
}
.config-bar-chevron.open { transform: rotate(180deg); }

/* CONFIG PANEL — animates with max-height, never display:none */
.chat-config-panel {
  flex-shrink: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 260ms cubic-bezier(0.16, 1, 0.3, 1);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
}
.chat-config-panel.open { max-height: 400px; }

.chat-config-inner {
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.form-row { display: flex; flex-direction: column; gap: var(--space-1); }
.form-label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.form-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

/* MESSAGES — min-height:0 is the critical fix */
.chat-messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}
.chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-3); color: var(--color-text-faint); padding: var(--space-8); text-align: center; }
.chat-empty svg { width: 40px; height: 40px; opacity: 0.4; }
.chat-empty p { font-size: var(--text-sm); max-width: 28ch; }

.msg { display: flex; flex-direction: column; gap: var(--space-2); }
.msg-role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-faint); }
.msg-bubble { background: var(--color-surface-offset); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); line-height: 1.6; color: var(--color-text); white-space: pre-wrap; word-break: break-word; }
.msg.user .msg-bubble { background: var(--color-primary-highlight); }
.msg.assistant .msg-role { color: var(--color-primary); }

/* CODE FENCE with Stage button */
.msg-bubble .fence-wrap { position: relative; margin: var(--space-2) 0; }
.msg-bubble .fence-filename {
  font-size: 10px;
  font-weight: 700;
  color: var(--color-primary);
  background: color-mix(in oklch, var(--color-primary) 10%, var(--color-surface));
  padding: 3px var(--space-3);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border: 1px solid var(--color-border);
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.msg-bubble .fence-code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  padding: var(--space-3);
  margin: 0;
}
.btn-stage {
  font-size: 10px;
  font-weight: 700;
  padding: 2px var(--space-2);
  min-height: 22px;
  border-radius: var(--radius-sm);
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-stage:hover { background: var(--color-primary-hover); }
.btn-stage.staged { background: var(--color-success); cursor: default; }

/* STAGED FILES TRAY — animates with max-height above input */
.staged-tray {
  flex-shrink: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 240ms cubic-bezier(0.16, 1, 0.3, 1);
  background: color-mix(in oklch, var(--color-primary) 6%, var(--color-surface));
  border-top: 1px solid var(--color-border);
}
.staged-tray.open { max-height: 300px; }

.staged-tray-inner { padding: var(--space-3) var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
.staged-tray-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-1);
}
.staged-tray-title { font-size: var(--text-xs); font-weight: 700; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
.staged-file-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
}
.staged-file-name { flex: 1; font-size: var(--text-xs); color: var(--color-text); font-family: 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-unstage { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); border-radius: var(--radius-sm); flex-shrink: 0; }
.btn-unstage:hover { color: var(--color-error); background: color-mix(in oklch, var(--color-error) 10%, var(--color-surface)); }

.push-controls {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  align-items: center;
  padding-top: var(--space-2);
  border-top: 1px solid var(--color-divider);
}
.push-controls .input { min-height: 36px; font-size: var(--text-xs); }
select.push-branch { min-height: 36px; font-size: var(--text-xs); max-width: 160px; }
.push-commit-input { flex: 1; min-width: 0; }
.btn-push {
  background: var(--color-primary);
  color: var(--color-text-inverse);
  font-size: var(--text-xs);
  font-weight: 700;
  padding: var(--space-2) var(--space-4);
  min-height: 36px;
  border-radius: var(--radius-md);
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-push:hover { background: var(--color-primary-hover); }
.btn-push:active { background: var(--color-primary-active); }
.btn-push:disabled { opacity: 0.4; cursor: not-allowed; }

/* PUSH STATUS */
#push-status { font-size: var(--text-xs); color: var(--color-text-muted); width: 100%; }

/* INPUT ROW */
.chat-input-row { display: flex; gap: var(--space-2); padding: var(--space-3) var(--space-4); border-top: 1px solid var(--color-border); background: var(--color-surface); flex-shrink: 0; }
.chat-input { flex: 1; background: var(--color-surface-offset); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); color: var(--color-text); resize: none; overflow-y: hidden; max-height: 120px; min-height: 44px; }
.chat-input:focus { outline: none; border-color: var(--color-primary); }
.chat-send { width: 44px; height: 44px; background: var(--color-primary); color: var(--color-text-inverse); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chat-send:hover { background: var(--color-primary-hover); }
.chat-send:active { background: var(--color-primary-active); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* LOADING DOTS */
@keyframes loading-dots { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
.loading-dots span { animation: loading-dots 1.4s ease-in-out infinite; display: inline-block; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-teal { background: var(--color-primary-highlight); color: var(--color-primary); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="repo-copilot logo">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
      <span class="header-title">repo-copilot</span>
    </div>
    <div class="header-spacer"></div>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- TABS -->
  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" data-tab="files" aria-selected="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      Files
      <span class="tab-badge" id="tab-badge-files" style="display:none">0</span>
    </button>
    <button class="tab" role="tab" data-tab="chat" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </button>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- FILES PANEL -->
    <div class="panel active" id="panel-files" role="tabpanel">

      <!-- REPO LOADER -->
      <div class="section">
        <div class="section-label">Repository</div>
        <div class="input-row" style="margin-bottom:var(--space-2)">
          <input class="input" id="repo-input" type="text" placeholder="github.com/owner/repo or owner/repo" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
          <button class="btn btn-primary btn-icon" id="load-btn" aria-label="Load repository">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div id="repo-status"></div>
        <div id="repo-card" style="display:none;margin-top:var(--space-3)"></div>
      </div>

      <!-- MAILBOX PINNED -->
      <div id="mailbox-section" class="mailbox-section" style="display:none">
        <div class="mailbox-header" id="mailbox-header" role="button" aria-expanded="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span class="mailbox-header-label">Mailbox</span>
          <svg class="mailbox-toggle open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="mailbox-list open" id="mailbox-list"></div>
      </div>

      <!-- FILE TREE -->
      <div id="tree-section" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="file-tree-toolbar">
          <div class="toolbar-left">
            <button class="btn btn-secondary btn-sm" id="select-all-btn">Select All</button>
            <button class="btn btn-secondary btn-sm" id="deselect-btn">Deselect All</button>
            <div class="toolbar-divider"></div>
            <button class="filter-btn" id="filter-code-btn" data-filter="code">Code</button>
            <button class="filter-btn" id="filter-docs-btn" data-filter="docs">Docs</button>
            <button class="filter-btn" id="filter-config-btn" data-filter="config">Config</button>
            <button class="filter-btn" id="filter-all-btn" data-filter="all">All</button>
          </div>
          <span class="file-count" id="file-count-label">0 selected</span>
        </div>
        <div id="filter-summary-bar" style="display:none;padding:var(--space-2) var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-divider);font-size:var(--text-xs);color:var(--color-primary);font-weight:600"></div>
        <div class="tree-container" id="tree-container"></div>
      </div>

      <!-- EXPORT -->
      <div id="export-section" style="display:none" class="section">
        <div class="section-label">Export</div>
        <div class="export-info" id="export-info"></div>
        <div class="export-buttons">
          <button class="btn btn-secondary" id="export-txt-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            REPO_DUMP.txt
          </button>
          <button class="btn btn-secondary" id="export-zip-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download ZIP
          </button>
        </div>
        <div id="fetch-status" style="margin-top:var(--space-3)"></div>
      </div>

    </div>

    <!-- CHAT PANEL -->
    <div class="panel" id="panel-chat" role="tabpanel">
      <div class="chat-wrap">

        <!-- STATUS BAR (always visible 44px) -->
        <div class="chat-config-bar" id="chat-config-bar" role="button" aria-expanded="false" aria-controls="chat-config-panel" tabindex="0">
          <span class="config-bar-dot" id="config-bar-dot"></span>
          <span class="config-bar-label" id="config-bar-label">Configure provider · model · API key</span>
          <span class="config-bar-tokens" id="config-bar-tokens" style="display:none"></span>
          <svg class="config-bar-chevron" id="config-bar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>

        <!-- CONFIG PANEL (max-height animated) -->
        <div class="chat-config-panel" id="chat-config-panel">
          <div class="chat-config-inner">
            <div class="form-row-inline">
              <div class="form-row">
                <label class="form-label" for="provider-select">Provider</label>
                <select class="input" id="provider-select">
                  <option value="openai">OpenAI</option>
                  <option value="groq">Groq</option>
                  <option value="xai">xAI (Grok)</option>
                  <option value="cerebras">Cerebras</option>
                  <option value="fireworks">Fireworks</option>
                  <option value="mistral">Mistral</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="gemini">Gemini</option>
                </select>
              </div>
              <div class="form-row">
                <label class="form-label" for="model-input">Model</label>
                <input class="input" id="model-input" type="text" placeholder="gpt-4o" autocomplete="off" autocapitalize="none" spellcheck="false">
              </div>
            </div>
            <div class="form-row">
              <label class="form-label" for="apikey-input">API Key / PAT</label>
              <input class="input" id="apikey-input" type="password" placeholder="sk-... or ghp_..." autocomplete="off">
            </div>
            <div class="form-row">
              <label class="form-label" for="context-select">Context</label>
              <select class="input" id="context-select">
                <option value="selected">Selected files</option>
                <option value="all">All loaded files</option>
                <option value="none">No file context</option>
              </select>
            </div>
          </div>
        </div>

        <!-- MESSAGES -->
        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty" id="chat-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Load a repo and select files, then ask anything about the code.</p>
          </div>
        </div>

        <!-- STAGED FILES TRAY -->
        <div class="staged-tray" id="staged-tray">
          <div class="staged-tray-inner">
            <div class="staged-tray-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--color-primary)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span class="staged-tray-title">Staged for push</span>
              <button class="btn-ghost btn-sm" id="clear-staged-btn" style="min-height:24px;padding:2px 8px;font-size:10px">Clear all</button>
            </div>
            <div id="staged-files-list"></div>
            <div class="push-controls">
              <input class="input push-commit-input" id="push-commit-msg" type="text" placeholder="Commit message..." autocomplete="off" spellcheck="false">
              <select class="input push-branch" id="push-branch-select">
                <option value="">Loading branches…</option>
              </select>
              <button class="btn-push" id="push-btn" disabled>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Push
              </button>
              <div id="push-status"></div>
            </div>
          </div>
        </div>

        <!-- INPUT ROW -->
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="Ask about the code…" rows="1"></textarea>
          <button class="chat-send" id="chat-send" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- FILE PREVIEW SHEET -->
<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="preview-sheet" role="dialog" aria-modal="true" aria-label="File preview">
  <div class="sheet-header">
    <span class="sheet-title" id="preview-title"></span>
    <button class="sheet-close" id="preview-close" aria-label="Close preview">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <pre class="code-block" id="preview-content"></pre>
  </div>
</div>

<script>
// =================== THEME TOGGLE ===================
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  const sunIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moonIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function updateIcon() { t.innerHTML = d === 'dark' ? sunIcon : moonIcon; }
  updateIcon();
  t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    updateIcon();
  });
})();

// =================== TABS ===================
document.querySelectorAll('[data-tab]').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    tab.setAttribute('aria-selected','true');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'chat') updateConfigBar();
  });
});

// =================== STATE ===================
let repoOwner = '', repoName = '', repoMeta = null;
let treeFlat = [];
let fileContents = {};
let checkedPaths = new Set();
let expandedDirs = new Set();
let mailboxFiles = [];
let activeFilters = new Set();

// Phase 3 state
let stagedFiles = {}; // { path: content }
let repoBranches = [];
let configPanelOpen = false;

const CODE_EXTS   = new Set(['.js','.ts','.jsx','.tsx','.py','.go','.rs','.java','.c','.cpp','.h','.rb','.php','.swift','.kt','.vue','.svelte']);
const DOC_EXTS    = new Set(['.md','.txt','.rst','.mdx','.csv','.log','.pdf']);
const CONFIG_EXTS = new Set(['.json','.yaml','.yml','.toml','.env','.gitignore','.eslintrc','.prettierrc','.editorconfig','.nvmrc','.html','.css','.sh']);

function getExt(path) {
  if (!path.includes('.')) return '';
  const base = path.split('/').pop();
  const dotIdx = base.lastIndexOf('.');
  if (dotIdx === 0) return base.toLowerCase();
  return ('.' + base.slice(dotIdx + 1)).toLowerCase();
}

function parseRepoInput(val) {
  val = val.trim();
  val = val.replace(/^https?:\/\/(www\.)?github\.com\//,'');
  val = val.replace(/\.git$/,'');
  const parts = val.split('/').filter(Boolean);
  if (parts.length >= 2) return { owner: parts[0], repo: parts[1] };
  if (parts.length === 1) return { owner: 'nothinginfinity', repo: parts[0] };
  return null;
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  return (bytes/1024).toFixed(1) + ' KB';
}

function setStatus(elId, type, msg) {
  const el = document.getElementById(elId);
  if (!msg) { el.innerHTML = ''; return; }
  const icons = {
    loading: '<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
  };
  el.innerHTML = `<div class="status status-${type}">${icons[type]||''}<span>${msg}</span></div>`;
}

// =================== CONFIG BAR ===================
function updateConfigBar() {
  const provider = document.getElementById('provider-select').value;
  const model = document.getElementById('model-input').value.trim();
  const key = document.getElementById('apikey-input').value.trim();
  const ready = provider && model && key;

  const dot = document.getElementById('config-bar-dot');
  const label = document.getElementById('config-bar-label');
  const tokens = document.getElementById('config-bar-tokens');

  dot.classList.toggle('ready', ready);

  if (ready) {
    label.textContent = `${provider} · ${model}`;
    const ctx = getContextContent();
    const est = Math.round(ctx.length / 4);
    tokens.textContent = est.toLocaleString() + ' tok';
    tokens.style.display = 'block';
  } else {
    label.textContent = 'Configure provider · model · API key';
    tokens.style.display = 'none';
  }
}

function openConfigPanel() {
  configPanelOpen = true;
  document.getElementById('chat-config-panel').classList.add('open');
  document.getElementById('config-bar-chevron').classList.add('open');
  document.getElementById('chat-config-bar').setAttribute('aria-expanded','true');
}

function closeConfigPanel() {
  configPanelOpen = false;
  document.getElementById('chat-config-panel').classList.remove('open');
  document.getElementById('config-bar-chevron').classList.remove('open');
  document.getElementById('chat-config-bar').setAttribute('aria-expanded','false');
}

function toggleConfigPanel() {
  if (configPanelOpen) closeConfigPanel(); else openConfigPanel();
}

document.getElementById('chat-config-bar').addEventListener('click', toggleConfigPanel);
document.getElementById('chat-config-bar').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleConfigPanel(); }
});

// Auto-collapse when all three fields filled and focus leaves panel
function maybeAutoCollapse() {
  const provider = document.getElementById('provider-select').value;
  const model = document.getElementById('model-input').value.trim();
  const key = document.getElementById('apikey-input').value.trim();
  if (provider && model && key) {
    setTimeout(() => {
      if (!document.getElementById('chat-config-panel').contains(document.activeElement)) {
        closeConfigPanel();
      }
    }, 120);
  }
  updateConfigBar();
}

document.getElementById('provider-select').addEventListener('change', maybeAutoCollapse);
document.getElementById('model-input').addEventListener('input', maybeAutoCollapse);
document.getElementById('apikey-input').addEventListener('input', maybeAutoCollapse);
document.getElementById('context-select').addEventListener('change', updateConfigBar);

// =================== REPO LOADER ===================
document.getElementById('load-btn').addEventListener('click', loadRepo);

async function loadRepo() {
  const raw = document.getElementById('repo-input').value;
  const parsed = parseRepoInput(raw);
  if (!parsed) { setStatus('repo-status', 'error', 'Enter a valid GitHub URL or owner/repo'); return; }
  repoOwner = parsed.owner; repoName = parsed.repo;
  setStatus('repo-status', 'loading', `Loading ${repoOwner}/${repoName}...`);
  document.getElementById('repo-card').style.display = 'none';
  document.getElementById('tree-section').style.display = 'none';
  document.getElementById('export-section').style.display = 'none';
  document.getElementById('mailbox-section').style.display = 'none';
  treeFlat = []; fileContents = {}; checkedPaths = new Set(); expandedDirs = new Set();
  mailboxFiles = []; activeFilters = new Set(); repoBranches = [];
  resetFilterButtons();

  try {
    const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}`);
    if (!res.ok) throw new Error(res.status === 404 ? 'Repository not found' : `GitHub API error ${res.status}`);
    repoMeta = await res.json();
    renderRepoCard(repoMeta);
    setStatus('repo-status', '');
    await loadTree(repoMeta.default_branch);
    loadBranches();
  } catch(e) {
    setStatus('repo-status', 'error', e.message);
  }
}

  document.getElementById('repo-card').innerHTML = `
    <div class="repo-card">
      <div class="repo-card-name">${meta.full_name}</div>
      ${meta.description ? `<div class="repo-card-desc">${meta.description}</div>` : ''}
      <div class="repo-meta">
        <div class="repo-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          ${meta.stargazers_count.toLocaleString()}
        </div>
        <div class="repo-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
          ${meta.default_branch}
        </div>
        <div class="repo-meta-item">

        ${meta.language ? `<div class="repo-meta-item"><span class="badge badge-teal">${meta.language}</span></div>` : ''}

async function loadTree(branch) {
  setStatus('repo-status', 'loading', 'Fetching file tree...');
  const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/git/trees/${branch}?recursive=1`);
  if (!res.ok) throw new Error(`Tree fetch failed: ${res.status}`);
  const data = await res.json();
  treeFlat = data.tree.filter(n => n.type === 'blob' || n.type === 'tree');

  mailboxFiles = treeFlat.filter(n => n.type === 'blob' && (n.path.endsWith('/inbox.md') || n.path.endsWith('/outbox.md') || n.path === 'inbox.md' || n.path === 'outbox.md'));
  renderMailbox();

  setStatus('repo-status', '');
  renderTree();
  const ts = document.getElementById('tree-section');
  ts.style.display = 'flex';
  document.getElementById('export-section').style.display = 'block';
  updateExportInfo();
}

// =================== BRANCH LOADER ===================
async function loadBranches() {
  const key = document.getElementById('apikey-input').value.trim();
  const headers = key ? { 'Authorization': `token ${key}` } : {};
  try {
    const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/branches?per_page=100`, { headers });
    if (!res.ok) return;
    const data = await res.json();
    repoBranches = data.map(b => b.name);
    renderBranchSelect();
  } catch(e) {}
}

function renderBranchSelect() {
  const sel = document.getElementById('push-branch-select');
  const current = sel.value;
  sel.innerHTML = repoBranches.map(b => `<option value="${b}"${b === (repoMeta && repoMeta.default_branch) ? ' selected' : ''}>${b}</option>`).join('');
  sel.innerHTML += `<option value="__new__">+ New branch…</option>`;
  if (current && repoBranches.includes(current)) sel.value = current;
}

document.getElementById('push-branch-select').addEventListener('change', function() {
  if (this.value === '__new__') {
    const name = prompt('New branch name:');
    if (name && name.trim()) {
      const opt = document.createElement('option');
      opt.value = name.trim();
      opt.textContent = name.trim();
      this.insertBefore(opt, this.querySelector('[value="__new__"]'));
      this.value = name.trim();
    } else {
      this.value = repoBranches[0] || '';
    }
  }
});

// =================== FILE TREE RENDER ===================
function buildTreeHierarchy(flat) {
  const root = { children: {}, type: 'tree', path: '' };
  flat.forEach(node => {
    const parts = node.path.split('/');
    let cur = root;
    parts.forEach((part, i) => {
      if (!cur.children[part]) cur.children[part] = { children: {}, type: i === parts.length-1 ? node.type : 'tree', path: parts.slice(0,i+1).join('/'), sha: node.sha, size: node.size };
      cur = cur.children[part];
    });
  });
  return root;
}

function renderTree() {
  const hierarchy = buildTreeHierarchy(treeFlat);
  const container = document.getElementById('tree-container');
  container.innerHTML = '';
  container.appendChild(renderNode(hierarchy, 0));
  updateSelectionCount();
  updateFilterSummaryBar();
}

function renderNode(node, depth) {
  const frag = document.createDocumentFragment();
  const sorted = Object.entries(node.children).sort(([an,a],[bn,b]) => {
    if (a.type !== b.type) return a.type === 'tree' ? -1 : 1;
    return an.localeCompare(bn);
  });
  sorted.forEach(([name, child]) => {
    const div = document.createElement('div');
    div.className = 'tree-node';
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.paddingLeft = `calc(var(--space-2) + ${depth * 16}px)`;

    if (child.type === 'tree') {
      const toggle = document.createElement('span');
      toggle.className = 'tree-toggle';
      toggle.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>';
      if (expandedDirs.has(child.path)) toggle.classList.add('open');
      item.appendChild(toggle);

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'tree-checkbox';
      cb.checked = isDirChecked(child.path);
      cb.addEventListener('change', e => { e.stopPropagation(); toggleDir(child.path, cb.checked); });
      item.appendChild(cb);

      const icon = document.createElement('span');
      icon.className = 'tree-icon';
      icon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
      item.appendChild(icon);

      const label = document.createElement('span');
      label.className = 'tree-name dir';
      label.textContent = name;
      item.appendChild(label);

      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'tree-children' + (expandedDirs.has(child.path) ? ' open' : '');
      childrenDiv.appendChild(renderNode(child, depth + 1));

      item.addEventListener('click', e => {
        if (e.target === cb) return;
        const open = expandedDirs.has(child.path);
        if (open) { expandedDirs.delete(child.path); toggle.classList.remove('open'); childrenDiv.classList.remove('open'); }
        else { expandedDirs.add(child.path); toggle.classList.add('open'); childrenDiv.classList.add('open'); }
      });

      div.appendChild(item);
      div.appendChild(childrenDiv);
    } else {
      const spacer = document.createElement('span');
      spacer.className = 'tree-toggle-spacer';
      item.appendChild(spacer);

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'tree-checkbox';
      cb.dataset.path = child.path;
      cb.checked = checkedPaths.has(child.path);
      cb.addEventListener('change', e => { e.stopPropagation(); toggleFile(child.path, cb.checked); });
      item.appendChild(cb);

      const icon = document.createElement('span');
      icon.className = 'tree-icon';
      const ext = getExt(child.path);
      const isCode = CODE_EXTS.has(ext);
      icon.innerHTML = isCode
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
      item.appendChild(icon);

      const label = document.createElement('span');
      label.className = 'tree-name';
      label.textContent = name;
      item.appendChild(label);

      if (child.size) {
        const sz = document.createElement('span');
        sz.className = 'tree-size';
        sz.textContent = fmtSize(child.size);
        item.appendChild(sz);
      }

      item.addEventListener('click', e => {
        if (e.target === cb) return;
        previewFile(child.path);
      });

      div.appendChild(item);
    }

    frag.appendChild(div);
  });
  return frag;
}

function isDirChecked(dirPath) {
  const files = treeFlat.filter(n => n.type === 'blob' && n.path.startsWith(dirPath + '/'));
  if (!files.length) return false;
  return files.every(f => checkedPaths.has(f.path));
}

function toggleFile(path, checked) {
  if (checked) checkedPaths.add(path); else checkedPaths.delete(path);
  updateSelectionCount();
  updateExportInfo();
  updateConfigBar();
}

function toggleDir(dirPath, checked) {
  treeFlat.filter(n => n.type === 'blob' && n.path.startsWith(dirPath + '/')).forEach(f => {
    if (checked) checkedPaths.add(f.path); else checkedPaths.delete(f.path);
  });
  renderTree();
  updateExportInfo();
  updateConfigBar();
}

function updateSelectionCount() {
  const n = checkedPaths.size;
  document.getElementById('file-count-label').textContent = n + ' selected';
  const badge = document.getElementById('tab-badge-files');
  if (n > 0) { badge.textContent = n; badge.style.display = 'inline-flex'; }
  else { badge.style.display = 'none'; }
}

// =================== FILTER BUTTONS ===================
function resetFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  updateFilterSummaryBar();
}

function updateFilterSummaryBar() {
  const bar = document.getElementById('filter-summary-bar');
  if (!activeFilters.size) { bar.style.display = 'none'; return; }
  const n = checkedPaths.size;
  const totalSize = [...checkedPaths].reduce((acc, p) => {
    const node = treeFlat.find(f => f.path === p);
    return acc + (node ? node.size || 0 : 0);
  }, 0);
  const labels = [...activeFilters].map(f => f.charAt(0).toUpperCase() + f.slice(1)).join(' · ');
  bar.style.display = 'block';
  bar.textContent = `${n} selected · ~${fmtSize(totalSize)} · ${labels}`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const filter = btn.dataset.filter;
    if (filter === 'all') {
      treeFlat.filter(n => n.type === 'blob').forEach(f => checkedPaths.add(f.path));
      activeFilters = new Set(['code','docs','config']);
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.add('active'));
    } else {
      const wasActive = activeFilters.has(filter);
      if (wasActive) {
        activeFilters.delete(filter);
        btn.classList.remove('active');
        document.getElementById('filter-all-btn').classList.remove('active');
        treeFlat.filter(n => n.type === 'blob').forEach(f => {
          const ext = getExt(f.path);
          const inDeselected = filterMatch(ext, filter);
          const inOtherActive = [...activeFilters].some(af => filterMatch(ext, af));
          if (inDeselected && !inOtherActive) checkedPaths.delete(f.path);
        });
      } else {
        activeFilters.add(filter);
        btn.classList.add('active');
        treeFlat.filter(n => n.type === 'blob').forEach(f => {
          const ext = getExt(f.path);
          if (filterMatch(ext, filter)) checkedPaths.add(f.path);
        });
        if (activeFilters.size === 3) document.getElementById('filter-all-btn').classList.add('active');
      }
    }
    renderTree();
    updateExportInfo();
    updateConfigBar();
    syncMailboxCheckboxes();
  });
});

function filterMatch(ext, filter) {
  if (filter === 'code')   return CODE_EXTS.has(ext);
  if (filter === 'docs')   return DOC_EXTS.has(ext);
  if (filter === 'config') return CONFIG_EXTS.has(ext);
  return false;
}

document.getElementById('select-all-btn').addEventListener('click', () => {
  treeFlat.filter(n => n.type === 'blob').forEach(f => checkedPaths.add(f.path));
  activeFilters = new Set(['code','docs','config']);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.add('active'));
  renderTree(); updateExportInfo(); updateConfigBar(); syncMailboxCheckboxes();
});
document.getElementById('deselect-btn').addEventListener('click', () => {
  checkedPaths.clear();
  activeFilters = new Set();
  resetFilterButtons();
  renderTree(); updateExportInfo(); updateConfigBar(); syncMailboxCheckboxes();
});

function updateExportInfo() {
  const n = checkedPaths.size;
  const totalSize = [...checkedPaths].reduce((acc, p) => {
    const node = treeFlat.find(f => f.path === p);
    return acc + (node ? node.size || 0 : 0);
  }, 0);
  let filterLabel = '';
  if (activeFilters.size > 0) {
    const labels = [...activeFilters].map(f => f.charAt(0).toUpperCase() + f.slice(1));
    filterLabel = ' &nbsp;&middot;&nbsp; <strong>' + labels.join(' + ') + '</strong>';
  }
  document.getElementById('export-info').innerHTML =
    `<strong>${n}</strong> files selected &nbsp;&middot;&nbsp; ~<strong>${fmtSize(totalSize)}</strong> total${filterLabel}`;
}

// =================== FILE PREVIEW ===================
async function previewFile(path) {
  document.getElementById('preview-title').textContent = path;
  document.getElementById('preview-content').textContent = 'Loading...';
  openSheet();

  let content = fileContents[path]?.content;
  if (!content) {
    try {
      const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${path}`);
      if (!res.ok) throw new Error('Failed to fetch');
      const data = await res.json();
      content = atob(data.content.replace(/\n/g,''));
      fileContents[path] = { content, size: data.size };
    } catch(e) {
      document.getElementById('preview-content').textContent = 'Error loading file: ' + e.message;
      return;
    }
  }
  document.getElementById('preview-content').textContent = content;
}

function openSheet() {
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('preview-sheet').classList.add('open');
  document.getElementById('preview-close').focus();
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('preview-sheet').classList.remove('open');
}
document.getElementById('preview-close').addEventListener('click', closeSheet);
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

// =================== FETCH SELECTED FILES ===================
async function fetchSelectedFiles() {
  const paths = [...checkedPaths];
  const toFetch = paths.filter(p => !fileContents[p]);
  if (!toFetch.length) return;

  setStatus('fetch-status', 'loading', `Fetching ${toFetch.length} files...`);
  let done = 0;
  const batchSize = 8;
  for (let i = 0; i < toFetch.length; i += batchSize) {
    const batch = toFetch.slice(i, i + batchSize);
    await Promise.all(batch.map(async path => {
      try {
        const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${path}`);
        if (!res.ok) return;
        const data = await res.json();
        const content = atob(data.content.replace(/\n/g,''));
        fileContents[path] = { content, size: data.size };
        done++;
        setStatus('fetch-status', 'loading', `Fetched ${done}/${toFetch.length}...`);
      } catch(e) {}
    }));
  }
  setStatus('fetch-status', 'success', `Fetched ${done} files`);
  setTimeout(() => setStatus('fetch-status', ''), 2000);
}

// =================== CODE FENCE PARSER ===================
// Detects ```filename.ext fences in assistant replies
// Returns array of { filename, content } objects
function parseFences(text) {
  const results = [];
  // Match ```filename.ext (must have a dot in the name portion)
  const fenceRe = /^```([^\s`]+\.[^\s`]+)\n([\s\S]*?)^```/gm;
  let m;
  while ((m = fenceRe.exec(text)) !== null) {
    results.push({ filename: m[1], content: m[2] });
  }
  return results;
}

// Render assistant message with fence highlighting + Stage buttons
function renderAssistantContent(text) {
  const fenceRe = /^```([^\s`]+\.[^\s`]+)\n([\s\S]*?)^```/gm;
  let last = 0;
  let html = '';
  let m;
  while ((m = fenceRe.exec(text)) !== null) {
    // text before this fence
    const before = text.slice(last, m.index);
    if (before) html += escHtml(before);
    const filename = escHtml(m[1]);
    const code = escHtml(m[2]);
    const alreadyStaged = stagedFiles.hasOwnProperty(m[1]);
    html += `<div class="fence-wrap" data-fence-file="${filename}">
      <div class="fence-filename">
        <span>${filename}</span>
        <button class="btn-stage${alreadyStaged ? ' staged' : ''}" data-file="${filename}" data-raw-idx="${m.index}">${alreadyStaged ? '✓ Staged' : 'Stage'}</button>
      </div>
      <pre class="fence-code">${code}</pre>
    </div>`;
    last = m.index + m[0].length;
  }
  const tail = text.slice(last);
  if (tail) html += escHtml(tail);
  return html;
}

// =================== STAGED FILES ===================
function stageFile(filename, content) {
  stagedFiles[filename] = content;
  renderStagedTray();
  updateStageBtns();
}

function unstageFile(filename) {
  delete stagedFiles[filename];
  renderStagedTray();
  updateStageBtns();
}

function renderStagedTray() {
  const tray = document.getElementById('staged-tray');
  const list = document.getElementById('staged-files-list');
  const count = Object.keys(stagedFiles).length;

  if (count === 0) {
    tray.classList.remove('open');
    list.innerHTML = '';
    return;
  }

  tray.classList.add('open');
  list.innerHTML = '';
  Object.keys(stagedFiles).forEach(filename => {
    const row = document.createElement('div');
    row.className = 'staged-file-row';
    row.innerHTML = `
      <span class="staged-file-name">${escHtml(filename)}</span>
      <button class="btn-unstage" data-file="${escHtml(filename)}" aria-label="Remove ${escHtml(filename)} from staged files">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    row.querySelector('.btn-unstage').addEventListener('click', () => unstageFile(filename));
    list.appendChild(row);
  });

  // Enable push button if we have a commit message
  validatePushBtn();

  // Reload branches if we have a repo and haven't loaded yet
  if (repoOwner && repoName && repoBranches.length === 0) loadBranches();
}

function updateStageBtns() {
  document.querySelectorAll('.btn-stage').forEach(btn => {
    const file = btn.dataset.file;
    if (stagedFiles.hasOwnProperty(file)) {
      btn.textContent = '✓ Staged';
      btn.classList.add('staged');
    } else {
      btn.textContent = 'Stage';
      btn.classList.remove('staged');
    }
  });
}

document.getElementById('clear-staged-btn').addEventListener('click', () => {
  stagedFiles = {};
  renderStagedTray();
  updateStageBtns();
});

document.getElementById('push-commit-msg').addEventListener('input', validatePushBtn);
document.getElementById('push-branch-select').addEventListener('change', validatePushBtn);

function validatePushBtn() {
  const hasFiles = Object.keys(stagedFiles).length > 0;
  const hasMsg = document.getElementById('push-commit-msg').value.trim().length > 0;
  const hasBranch = document.getElementById('push-branch-select').value && document.getElementById('push-branch-select').value !== '__new__';
  document.getElementById('push-btn').disabled = !(hasFiles && hasMsg && hasBranch);
}

// =================== GITHUB PUSH ===================
document.getElementById('push-btn').addEventListener('click', pushFiles);

async function pushFiles() {
  const key = document.getElementById('apikey-input').value.trim();
  if (!key) { setPushStatus('error', 'API Key / PAT required in chat config'); return; }
  if (!repoOwner || !repoName) { setPushStatus('error', 'Load a repository first'); return; }

  const commitMsg = document.getElementById('push-commit-msg').value.trim();
  const branch = document.getElementById('push-branch-select').value;
  const files = Object.entries(stagedFiles);
  if (!files.length) return;

  document.getElementById('push-btn').disabled = true;
  setPushStatus('loading', `Pushing ${files.length} file${files.length > 1 ? 's' : ''}…`);

  const headers = {
    'Authorization': `token ${key}`,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github+json'
  };

  let pushed = 0;
  let errors = [];

  for (const [filePath, content] of files) {
    try {
      // Get current SHA if file exists (needed for update vs create)
      let sha = undefined;
      const checkRes = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}?ref=${encodeURIComponent(branch)}`, { headers });
      if (checkRes.ok) {
        const existing = await checkRes.json();
        sha = existing.sha;
      }

      // base64-encode content
      const b64 = btoa(unescape(encodeURIComponent(content)));

      const body = {
        message: commitMsg,
        content: b64,
        branch: branch,
      };
      if (sha) body.sha = sha;

      const putRes = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(body)
      });

      if (!putRes.ok) {
        const err = await putRes.text();
        errors.push(`${filePath}: ${putRes.status}`);
        console.error('Push error', filePath, err);
      } else {
        pushed++;
      }
    } catch(e) {
      errors.push(`${filePath}: ${e.message}`);
    }
  }

  if (errors.length === 0) {
    setPushStatus('success', `✓ Pushed ${pushed} file${pushed > 1 ? 's' : ''} to ${branch}`);
    stagedFiles = {};
    renderStagedTray();
    updateStageBtns();
    document.getElementById('push-commit-msg').value = '';
  } else if (pushed > 0) {
    setPushStatus('error', `${pushed} pushed, ${errors.length} failed: ${errors[0]}`);
  } else {
    setPushStatus('error', `Push failed: ${errors[0]}`);
    validatePushBtn();
  }

  setTimeout(() => setPushStatus('', ''), 4000);
}

function setPushStatus(type, msg) {
  const el = document.getElementById('push-status');
  if (!type) { el.textContent = ''; return; }
  const colors = { loading: 'var(--color-primary)', error: 'var(--color-error)', success: 'var(--color-success)' };
  el.style.color = colors[type] || 'var(--color-text-muted)';
  el.textContent = msg;
}

// =================== CHAT ===================
let chatHistory = [];

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  const apiKey = document.getElementById('apikey-input').value.trim();
  if (!apiKey) {
    openConfigPanel();
    document.getElementById('apikey-input').focus();
    return;
  }

  chatInput.value = '';
  chatInput.style.height = '';
  appendMsg('user', text);
  document.getElementById('chat-empty').style.display = 'none';

  const provider = document.getElementById('provider-select').value;
  const model = document.getElementById('model-input').value.trim() || PROVIDERS[provider].model;
  const ctx = getContextContent();

  const userMsg = ctx ? `<context>\n${ctx}\n</context>\n\n${text}` : text;
  chatHistory.push({ role: 'user', content: userMsg });

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg assistant';
  thinkingEl.innerHTML = `<div class="msg-role">Assistant</div><div class="msg-bubble"><span class="loading-dots"><span>&#x2022;</span><span>&#x2022;</span><span>&#x2022;</span></span></div>`;
  document.getElementById('chat-messages').appendChild(thinkingEl);
  scrollChatBottom();
  document.getElementById('chat-send').disabled = true;

  try {
    let reply = '';
    if (PROVIDERS[provider].compat) {
      const res = await fetch(`${PROVIDERS[provider].base}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: chatHistory, stream: false })
      });
      if (!res.ok) { const err = await res.text(); throw new Error(`API error ${res.status}: ${err.slice(0,200)}`); }
      const data = await res.json();
      reply = data.choices?.[0]?.message?.content || '(empty response)';
    } else {
      const msgs = chatHistory.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] }));
      const res = await fetch(`${PROVIDERS[provider].base}/models/${model}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: msgs })
      });
      if (!res.ok) { const err = await res.text(); throw new Error(`Gemini error ${res.status}: ${err.slice(0,200)}`); }
      const data = await res.json();
      reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(empty response)';
    }
    chatHistory.push({ role: 'assistant', content: reply });
    thinkingEl.remove();
    appendAssistantMsg(reply);
  } catch(e) {
    thinkingEl.remove();
    appendMsg('assistant', 'Error: ' + e.message);
  } finally {
    document.getElementById('chat-send').disabled = false;
  }
}

function appendMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="msg-role">${role === 'user' ? 'You' : 'Assistant'}</div><div class="msg-bubble">${escHtml(content)}</div>`;
  document.getElementById('chat-messages').appendChild(div);
  scrollChatBottom();
}

function appendAssistantMsg(content) {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderAssistantContent(content);
  div.innerHTML = '<div class="msg-role">Assistant</div>';
  div.appendChild(bubble);

  // Wire up Stage buttons
  bubble.querySelectorAll('.btn-stage').forEach(btn => {
    btn.addEventListener('click', () => {
      const filename = btn.dataset.file;
      // Find content from the fence-wrap
      const wrap = btn.closest('.fence-wrap');
      const codeEl = wrap && wrap.querySelector('.fence-code');
      const rawContent = codeEl ? codeEl.textContent : '';
      if (stagedFiles.hasOwnProperty(filename)) {
        unstageFile(filename);
      } else {
        stageFile(filename, rawContent);
      }
    });
  });

  document.getElementById('chat-messages').appendChild(div);
  scrollChatBottom();
}

function scrollChatBottom() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initial config bar state
updateConfigBar();
</script>
