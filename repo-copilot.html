<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repo-copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root,[data-theme="light"]{--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;--color-surface-dynamic:#e6e4df;--color-divider:#dcd9d5;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;--color-text-inverse:#f9f8f4;--color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;--color-primary-highlight:#cedcd8;--color-error:#a12c7b;--color-success:#437a22;--color-warning:#964219;--shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);--shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);--radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;--text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);--text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);--space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);--font-body:'Satoshi','Inter',sans-serif;}
[data-theme="dark"]{--color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;--color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;--color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;--color-text-inverse:#2b2a28;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;--color-primary-highlight:#313b3b;--color-error:#d163a7;--color-success:#6daa45;--color-warning:#bb653b;--shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);--shadow-lg:0 12px 32px oklch(0 0 0/.4);}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;--color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;--color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;--color-text-inverse:#2b2a28;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;--color-primary-highlight:#313b3b;--shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);--shadow-lg:0 12px 32px oklch(0 0 0/.4);}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);overflow-x:hidden;}
img,svg{display:block;max-width:100%;}
input,button,textarea,select{font:inherit;color:inherit;}
button{cursor:pointer;background:none;border:none;}
a,button,[role="button"]{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive),box-shadow var(--transition-interactive),opacity var(--transition-interactive);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:var(--radius-sm);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;}

/* ─── SHELL ─────────────────────────────────────────────────────────────── */
/* App is a full-viewport flex column: header → tabs → main */
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
.header{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-border);flex-shrink:0;min-height:52px;}
.header-logo{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0;}
.header-logo svg{width:24px;height:24px;color:var(--color-primary);}
.header-title{font-size:var(--text-sm);font-weight:700;color:var(--color-text);letter-spacing:-0.01em;}
.header-spacer{flex:1;}
.theme-toggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border-radius:var(--radius-md);}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-dynamic);}

/* Tabs: sticky, never scrolls away */
.tabs{display:flex;background:var(--color-surface);border-bottom:1px solid var(--color-border);flex-shrink:0;}
.tab{flex:1;padding:var(--space-3) var(--space-2);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);border-bottom:2px solid transparent;text-align:center;min-height:44px;display:flex;align-items:center;justify-content:center;gap:var(--space-2);}
.tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);}
.tab:hover:not(.active){color:var(--color-text);background:var(--color-surface-dynamic);}
.tab-badge{background:var(--color-primary);color:var(--color-text-inverse);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:var(--radius-full);display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}

/* Main: fills remaining height, never overflows shell */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

/* ─── PANEL SYSTEM ───────────────────────────────────────────────────────── */
/* Every panel fills .main exactly — no panel introduces its own outer scroll */
.panel{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.panel.active{display:flex;}

/* ─── FILES PANEL ────────────────────────────────────────────────────────── */
/*
  Layout (top→bottom, all within 100% of .main height):
    1. .files-top      — repo input + mailbox accordion — shrinks to content, max 30vh, own scroll
    2. .file-tree-toolbar — filter/select bar — fixed height, never shrinks
    3. #tree-container — file tree — GROWS to fill all remaining space, scrolls
    4. #export-wrap    — export + push-self — shrinks to content, never clips
*/
#panel-files{flex-direction:column;}

.files-top{
  flex-shrink:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  max-height:30vh;
  border-bottom:1px solid var(--color-divider);
}

.file-tree-toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:var(--space-2);
  padding:var(--space-3) var(--space-4);
  background:var(--color-surface);
  border-bottom:1px solid var(--color-divider);
  align-items:center;
  flex-shrink:0;
}
.toolbar-left{display:flex;gap:var(--space-2);flex:1;flex-wrap:wrap;align-items:center;}
.toolbar-divider{width:1px;height:20px;background:var(--color-border);flex-shrink:0;}
.file-count{font-size:var(--text-xs);color:var(--color-text-muted);align-self:center;flex-shrink:0;}

/* Tree: the only growing + scrolling region in the files panel */
#tree-container{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:var(--space-2);
  min-height:0;          /* critical for flex shrink to work */
}

/* Export: pinned to bottom, never clipped */
#export-wrap{
  flex-shrink:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  max-height:40vh;       /* prevents export from eating the whole panel on short viewports */
  border-top:1px solid var(--color-divider);
  background:var(--color-surface);
}

/* ─── SHARED COMPONENTS ──────────────────────────────────────────────────── */
.section{padding:var(--space-4);border-bottom:1px solid var(--color-divider);}
.section-label{font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-3);}
.input-row{display:flex;gap:var(--space-2);}
.input{flex:1;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);font-size:var(--text-sm);color:var(--color-text);min-height:44px;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive);}
.input::placeholder{color:var(--color-text-faint);}
.input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 2px var(--color-primary-highlight);}
textarea.input{min-height:80px;resize:vertical;}
select.input{cursor:pointer;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);font-weight:600;border-radius:var(--radius-md);min-height:44px;white-space:nowrap;}
.btn-primary{background:var(--color-primary);color:var(--color-text-inverse);}
.btn-primary:hover{background:var(--color-primary-hover);}
.btn-primary:active{background:var(--color-primary-active);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:var(--color-surface-dynamic);color:var(--color-text);border:1px solid var(--color-border);}
.btn-secondary:hover{background:var(--color-surface-offset-2);}
.btn-ghost{color:var(--color-text-muted);padding:var(--space-2) var(--space-3);min-height:36px;border-radius:var(--radius-md);}
.btn-ghost:hover{color:var(--color-text);background:var(--color-surface-dynamic);}
.btn-icon{width:44px;height:44px;padding:0;border-radius:var(--radius-md);flex-shrink:0;}
.btn-sm{padding:var(--space-2) var(--space-3);min-height:36px;font-size:var(--text-xs);}
.btn-full{width:100%;}
.filter-btn{padding:var(--space-2) var(--space-3);min-height:36px;font-size:var(--text-xs);font-weight:600;border-radius:var(--radius-md);background:var(--color-surface-dynamic);color:var(--color-text-muted);border:1px solid var(--color-border);}
.filter-btn.active{background:var(--color-primary);color:var(--color-text-inverse);border-color:var(--color-primary);}
.repo-card{background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);}
.repo-card-name{font-size:var(--text-base);font-weight:700;color:var(--color-text);margin-bottom:var(--space-1);}
.repo-card-desc{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3);line-height:1.5;}
.repo-meta{display:flex;flex-wrap:wrap;gap:var(--space-3);}
.repo-meta-item{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);color:var(--color-text-muted);}
.repo-meta-item svg{width:14px;height:14px;flex-shrink:0;}
.status{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3);border-radius:var(--radius-md);font-size:var(--text-xs);}
.status-loading{background:color-mix(in oklch,var(--color-primary) 10%,var(--color-surface));color:var(--color-primary);}
.status-error{background:color-mix(in oklch,var(--color-error) 10%,var(--color-surface));color:var(--color-error);}
.status-success{background:color-mix(in oklch,var(--color-success) 10%,var(--color-surface));color:var(--color-success);}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MAILBOX */
.mailbox-section{background:color-mix(in oklch,var(--color-primary) 6%,var(--color-surface));border-bottom:1px solid var(--color-divider);flex-shrink:0;}
.mailbox-header{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);cursor:pointer;min-height:40px;}
.mailbox-header:hover{background:color-mix(in oklch,var(--color-primary) 10%,var(--color-surface));}
.mailbox-header svg{width:14px;height:14px;color:var(--color-primary);flex-shrink:0;}
.mailbox-header-label{font-size:var(--text-xs);font-weight:700;color:var(--color-primary);text-transform:uppercase;letter-spacing:0.06em;flex:1;}
.mailbox-toggle{width:16px;height:16px;color:var(--color-primary);transition:transform 180ms;}
.mailbox-toggle.open{transform:rotate(90deg);}
.mailbox-list{padding:0 var(--space-4) var(--space-3);display:none;flex-direction:column;gap:var(--space-1);}
.mailbox-list.open{display:flex;}
.mailbox-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);cursor:pointer;min-height:36px;}
.mailbox-item:hover{background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface));}
.mailbox-item svg{width:14px;height:14px;color:var(--color-primary);flex-shrink:0;}
.mailbox-item-path{flex:1;font-size:var(--text-xs);color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mailbox-item-size{font-size:10px;color:var(--color-text-faint);flex-shrink:0;}
.mailbox-item-cb{width:16px;height:16px;accent-color:var(--color-primary);cursor:pointer;flex-shrink:0;}

/* FILE TREE */
.tree-node{user-select:none;}
.tree-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2);border-radius:var(--radius-sm);min-height:40px;cursor:pointer;}
.tree-item:hover{background:var(--color-surface-dynamic);}
.tree-item:active{background:var(--color-surface-offset-2);}
.tree-toggle{width:20px;height:20px;flex-shrink:0;color:var(--color-text-faint);display:flex;align-items:center;justify-content:center;transition:transform 180ms;}
.tree-toggle.open{transform:rotate(90deg);}
.tree-toggle-spacer{width:20px;flex-shrink:0;}
.tree-checkbox{width:18px;height:18px;flex-shrink:0;accent-color:var(--color-primary);cursor:pointer;}
.tree-icon{width:16px;height:16px;flex-shrink:0;color:var(--color-text-muted);}
.tree-name{flex:1;font-size:var(--text-sm);color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tree-name.dir{color:var(--color-text-muted);font-weight:500;}
.tree-size{font-size:10px;color:var(--color-text-faint);flex-shrink:0;font-variant-numeric:tabular-nums;}
.tree-children{padding-left:20px;display:none;}
.tree-children.open{display:block;}

/* EXPORT */
.export-section-inner{padding:var(--space-3) var(--space-4);}
.export-section-label{font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-3);}
.export-info{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);padding:var(--space-2) var(--space-3);background:var(--color-surface-offset);border-radius:var(--radius-md);line-height:1.6;}
.export-buttons{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:0;}

/* PUSH SELF */
.push-section{border-top:1px solid var(--color-divider);padding-top:var(--space-3);margin-top:var(--space-3);}
.push-label{font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-2);display:flex;align-items:center;gap:var(--space-2);}
.push-badge{font-size:9px;font-weight:700;background:var(--color-primary);color:var(--color-text-inverse);padding:2px 6px;border-radius:var(--radius-full);}
.push-status{font-size:var(--text-xs);color:var(--color-text-muted);min-height:18px;padding:var(--space-1) 0;line-height:1.4;}
.push-status.ok{color:var(--color-success);}
.push-status.err{color:var(--color-error);}
.form-row{display:flex;flex-direction:column;gap:var(--space-1);margin-bottom:var(--space-2);}
.form-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;}

/* ─── CHAT PANEL ─────────────────────────────────────────────────────────── */
/*
  Layout (top→bottom):
    1. .chat-config-bar   — collapsed status bar — fixed, flex-shrink:0
    2. .chat-config-panel — expandable config — flex-shrink:0, no scroll needed
    3. .chat-messages     — message list — GROWS, scrolls independently
    4. #staged-tray       — staged files — flex-shrink:0, own inner scroll
    5. .chat-input-row    — send bar — flex-shrink:0, always visible
*/
.chat-wrap{display:flex;flex-direction:column;height:100%;min-height:0;}

/* Config bar (collapsed) */
.chat-config-bar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider);cursor:pointer;flex-shrink:0;min-height:44px;background:var(--color-surface);user-select:none;}
.chat-config-bar:hover{background:var(--color-surface-dynamic);}
.config-bar-dot{width:8px;height:8px;border-radius:var(--radius-full);background:var(--color-text-faint);flex-shrink:0;transition:background var(--transition-interactive);}
.config-bar-dot.ready{background:var(--color-success);}
.config-bar-label{flex:1;font-size:var(--text-xs);color:var(--color-text-muted);font-weight:500;}
.config-bar-tokens{font-size:10px;color:var(--color-text-faint);flex-shrink:0;}
.config-bar-chevron{width:16px;height:16px;color:var(--color-text-faint);flex-shrink:0;transition:transform 180ms;}
.config-bar-chevron.open{transform:rotate(180deg);}

/* Config panel (expanded) */
.chat-config-panel{padding:var(--space-4);border-bottom:1px solid var(--color-divider);display:none;flex-direction:column;gap:var(--space-3);flex-shrink:0;background:var(--color-surface);}
.chat-config-panel.open{display:flex;}
.form-row-inline{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);}
.token-est{font-size:var(--text-xs);color:var(--color-text-faint);text-align:right;margin-top:var(--space-1);}
.token-est span{color:var(--color-primary);font-weight:600;}

/* Messages: the only growing + scrolling region in chat */
.chat-messages{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:var(--space-4);
  display:flex;
  flex-direction:column;
  gap:var(--space-4);
  min-height:0;
  scroll-behavior:smooth;
}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-3);color:var(--color-text-faint);padding:var(--space-8);text-align:center;}
.chat-empty svg{width:40px;height:40px;opacity:.4;}
.chat-empty p{font-size:var(--text-sm);max-width:28ch;}
.msg{display:flex;flex-direction:column;gap:var(--space-2);}
.msg-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);}
.msg-bubble{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);line-height:1.6;color:var(--color-text);white-space:pre-wrap;word-break:break-word;}
.msg.user .msg-bubble{background:var(--color-primary-highlight);}
.msg.assistant .msg-role{color:var(--color-primary);}

/* Send bar: always pinned to bottom */
.chat-input-row{display:flex;gap:var(--space-2);padding:var(--space-3) var(--space-4);border-top:1px solid var(--color-border);background:var(--color-surface);flex-shrink:0;}
.chat-input{flex:1;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--color-text);resize:none;overflow-y:hidden;max-height:120px;min-height:44px;}
.chat-input:focus{outline:none;border-color:var(--color-primary);}
.chat-send{width:44px;height:44px;background:var(--color-primary);color:var(--color-text-inverse);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send:hover{background:var(--color-primary-hover);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}

/* Scroll-to-bottom fab */
.chat-scroll-bottom{position:absolute;right:var(--space-4);bottom:calc(56px + var(--space-4));width:40px;height:40px;border-radius:var(--radius-full);display:none;align-items:center;justify-content:center;background:var(--color-surface);color:var(--color-text);border:1px solid var(--color-border);box-shadow:var(--shadow-md);z-index:2;}
.chat-scroll-bottom.show{display:flex;}
.chat-scroll-bottom:hover{background:var(--color-surface-dynamic);}

@keyframes loading-dots{0%,80%,100%{opacity:0}40%{opacity:1}}
.loading-dots span{animation:loading-dots 1.4s ease-in-out infinite;display:inline-block;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.badge-teal{background:var(--color-primary-highlight);color:var(--color-primary);}

/* FENCE WRAP */
.fence-wrap{position:relative;margin:var(--space-2) 0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--color-border);}
.fence-filename{display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) var(--space-3);background:var(--color-surface-offset-2);font-size:10px;font-weight:700;color:var(--color-text-muted);letter-spacing:0.04em;border-bottom:1px solid var(--color-border);}
.fence-filename .btn-stage{font-size:10px;font-weight:700;padding:2px 8px;min-height:24px;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary);border:none;cursor:pointer;}
.fence-filename .btn-stage.staged{background:var(--color-success);color:#fff;}
.fence-code{font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--color-text);white-space:pre-wrap;word-break:break-word;background:var(--color-surface-offset);padding:var(--space-3) var(--space-4);margin:0;}

/* STAGED TRAY */
#staged-tray{display:none;flex-direction:column;border-top:1px solid var(--color-border);background:var(--color-surface);flex-shrink:0;}
#staged-tray.open{display:flex;}
.staged-tray-header{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-bottom:1px solid var(--color-divider);}
.staged-tray-title{flex:1;font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;}
.staged-files-list{display:flex;flex-direction:column;gap:var(--space-1);padding:var(--space-2) var(--space-4);max-height:120px;overflow-y:auto;}
.staged-file-row{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) 0;}
.staged-file-name{flex:1;font-size:var(--text-xs);color:var(--color-text);}
.staged-tray-actions{display:flex;gap:var(--space-2);padding:var(--space-2) var(--space-4) var(--space-3);align-items:center;flex-wrap:wrap;}
.staged-tray-actions select.input{min-height:36px;font-size:var(--text-xs);}
.staged-tray-actions input.input{min-height:36px;font-size:var(--text-xs);flex:1;}
#push-status-chat{font-size:var(--text-xs);color:var(--color-text-muted);min-height:16px;}
#push-status-chat.ok{color:var(--color-success);}
#push-status-chat.err{color:var(--color-error);}

/* SHEET */
.sheet-backdrop{position:fixed;inset:0;background:oklch(0.1 0 0/.6);z-index:100;display:none;backdrop-filter:blur(2px);}
.sheet-backdrop.open{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:85dvh;background:var(--color-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;z-index:101;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 300ms cubic-bezier(0.16,1,0.3,1);box-shadow:var(--shadow-lg);}
.sheet.open{transform:translateY(0);}
.sheet-header{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4);border-bottom:1px solid var(--color-border);flex-shrink:0;}
.sheet-title{flex:1;font-size:var(--text-sm);font-weight:600;color:var(--color-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sheet-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border-radius:var(--radius-full);flex-shrink:0;}
.sheet-close:hover{background:var(--color-surface-dynamic);}
.sheet-body{flex:1;overflow-y:auto;padding:var(--space-4);}
.code-block{font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--color-text);white-space:pre-wrap;word-break:break-word;background:var(--color-surface-offset);padding:var(--space-4);border-radius:var(--radius-md);border:1px solid var(--color-border);}
</style>
</head>
