openapi: 3.1.0
info:
  title: Bob GitHub Relay
  description: |
    Bob-native GitHub write relay for nothinginfinity/repo-copilot.
    All writes go through the relay worker — Bob never touches the raw GitHub API.
    Relay handles base64, SHA lookup, create-vs-update, multi-file commits, and auth.
  version: 2.0.0

servers:
  - url: YOUR_RELAY_URL
    description: Cloudflare Worker relay (replace YOUR_RELAY_URL after deploy)

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Check relay is live
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  relay: { type: string }
                  version: { type: string }

  /get_file:
    post:
      operationId: getFile
      summary: Read a file from the repo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Repo-relative file path (e.g. spaces/mail.md)
      responses:
        '200':
          description: File content and SHA
          content:
            application/json:
              schema:
                type: object
                properties:
                  path: { type: string }
                  content: { type: string }
                  sha: { type: string }

  /push_files:
    post:
      operationId: pushFiles
      summary: Write 1-10 files to the repo in one commit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files, message]
              properties:
                files:
                  type: array
                  maxItems: 10
                  items:
                    type: object
                    required: [path, content]
                    properties:
                      path:
                        type: string
                        description: Repo-relative file path
                      content:
                        type: string
                        description: Raw file content (relay handles base64)
                message:
                  type: string
                  description: Commit message
      responses:
        '200':
          description: Files pushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        path: { type: string }
                        sha: { type: string }
                        commit: { type: string }

  /append_mail:
    post:
      operationId: appendMail
      summary: Append a message block to spaces/mail.md
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Full message block to append (Markdown, starting with ## 📨 MSG-NNN)
                mark_read_id:
                  type: string
                  description: Optional MSG ID to mark as read (e.g. MSG-005)
      responses:
        '200':
          description: Mail updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  commit: { type: string }

  /push_turn_bundle:
    post:
      operationId: pushTurnBundle
      summary: Write a turn.json bundle and optionally update mail.md
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [turn_json]
              properties:
                turn_json:
                  type: object
                  description: Turn bundle object (must include cid and session fields)
                  required: [cid, session]
                  properties:
                    schema_version: { type: string }
                    cid: { type: string }
                    session: { type: string }
                    title: { type: string }
                    date: { type: string }
                    agent: { type: string }
                    source: { type: string }
                    q_summary: { type: string }
                    a_summary: { type: string }
                    files_changed:
                      type: array
                      items: { type: string }
                    decisions:
                      type: array
                      items: { type: string }
                    open_questions:
                      type: array
                      items: { type: string }
                mail_update:
                  type: object
                  description: Optional mail append operation
                  properties:
                    content: { type: string }
                    mark_read_id: { type: string }
      responses:
        '200':
          description: Turn bundle pushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  turn_commit: { type: string }
                  mail_commit: { type: string }

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: RELAY_SECRET — set in Cloudflare Worker secrets, paste into GPT Action Bearer auth
