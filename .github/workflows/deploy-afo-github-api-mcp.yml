name: Deploy AFO GitHub API MCP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-afo-github-api-mcp.yml
      - apps/afo-github-api-mcp/**

permissions:
  contents: read

concurrency:
  group: deploy-afo-github-api-mcp
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy afo-github-api-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Worker
        shell: bash
        run: npx wrangler@latest deploy --config apps/afo-github-api-mcp/wrangler.toml
