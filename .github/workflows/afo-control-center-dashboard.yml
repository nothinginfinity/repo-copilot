name: AFO Control Center Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "apps/afo-control-center-dashboard/**"
      - ".github/workflows/afo-control-center-dashboard.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Cloudflare"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build and dry-run dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/afo-control-center-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            npm install && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Build generated worker
        run: npm run build

      - name: Verify generated worker exists
        run: test -f worker.generated.js

      - name: Wrangler dry run
        run: npm run check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    name: Deploy dashboard
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/afo-control-center-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            npm install && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Build generated worker
        run: npm run build

      - name: Deploy with Wrangler
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
