name: Seed Calitree Cannabis Strains

on:
  workflow_dispatch:
    inputs:
      maxRowsPerChunk:
        description: "CSV rows to process per API call. Keep modest for Worker limits."
        required: true
        default: "300"
      baseUrl:
        description: "Calitree Worker base URL."
        required: true
        default: "https://calitree-cannabis-feed-mcp.jaredtechfit.workers.dev"

jobs:
  seed:
    runs-on: ubuntu-latest
    name: Seed all cannabis strain + lineage data (loops until complete)

    steps:
      - name: Loop seed endpoint until done
        env:
          CALITREE_MCP_TOKEN: ${{ secrets.CALITREE_MCP_TOKEN }}
          BASE_URL: ${{ github.event.inputs.baseUrl }}
          MAX_ROWS: ${{ github.event.inputs.maxRowsPerChunk }}
        run: |
          set -euo pipefail
          if [ -z "${CALITREE_MCP_TOKEN:-}" ]; then
            echo "Missing GitHub secret CALITREE_MCP_TOKEN"
            exit 1
          fi
          START_LINE=0
          ITER=0
          MAX_ITER=40
          while true; do
            ITER=$((ITER+1))
            if [ "$ITER" -gt "$MAX_ITER" ]; then
              echo "Hit safety cap of $MAX_ITER iterations - stopping."
              exit 1
            fi
            URL="${BASE_URL%/}/admin/seed/cannabis-strains?startLine=${START_LINE}&maxRows=${MAX_ROWS}"
            echo "=== Chunk $ITER: calling startLine=${START_LINE}, maxRows=${MAX_ROWS} ==="
            HTTP_STATUS=$(curl -sS -w "%{http_code}" -o response.json \
              -H "Authorization: Bearer ${CALITREE_MCP_TOKEN}" \
              -H "Accept: application/json" \
              "${URL}")
            echo "HTTP status: ${HTTP_STATUS}"
            cat response.json
            echo
            if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
              exit 1
            fi
            RESULT=$(python3 - <<'PY'
import json, sys
from pathlib import Path
data = json.loads(Path('response.json').read_text())
print('ok:', data.get('ok'))
print('strains_this_chunk:', data.get('strains_this_chunk'))
print('lineage_edges_this_chunk:', data.get('lineage_edges_this_chunk'))
print('total_strains:', data.get('total_strains'))
print('total_lineage_edges:', data.get('total_lineage_edges'))
print('hasMore:', data.get('hasMore'))
print('nextStartLine:', data.get('nextStartLine'))
if data.get('ok') is not True:
    sys.exit(1)
has_more = data.get('hasMore')
next_start = data.get('nextStartLine')
print(f"HAS_MORE={'1' if has_more else '0'}")
print(f"NEXT_START={next_start if next_start is not None else 0}")
PY
)
            echo "$RESULT"
            HAS_MORE=$(echo "$RESULT" | grep '^HAS_MORE=' | cut -d= -f2)
            NEXT_START=$(echo "$RESULT" | grep '^NEXT_START=' | cut -d= -f2)
            if [ "$HAS_MORE" != "1" ]; then
              echo "=== Done. All strain and lineage rows processed. ==="
              break
            fi
            START_LINE=$NEXT_START
          done

      - name: Upload final response artifact
        uses: actions/upload-artifact@v4
        with:
          name: calitree-cannabis-seed-final-response
          path: response.json
