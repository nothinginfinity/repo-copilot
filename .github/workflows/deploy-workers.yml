name: Deploy Workers to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy changed workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy contractor-v003-2-afo
        if: contains(github.event.head_commit.modified, 'workers/contractor-v003-2-afo/') || contains(github.event.head_commit.added, 'workers/contractor-v003-2-afo/')
        working-directory: workers/contractor-v003-2-afo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
