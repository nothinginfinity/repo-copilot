name: Deploy Workers to Cloudflare

on:
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker directory under workers/ to deploy'
        required: true
        default: 'afo-youtube-transcript-resilient-mcp'
        type: choice
        options:
          - afo-youtube-transcript-mcp-v2
          - afo-youtube-transcript-resilient-mcp
          - afo-youtube-browser-capture-worker
          - afo-feed-discoverer-worker
          - afo-podcast-inspector-worker
          - afo-article-metadata-worker
          - afo-sitemap-discovery-worker
          - afo-source-registry-worker
          - afo-trend-collector-worker
          - afo-transcript-capture-mcp
          - afo-repo-change-ledger-mcp
          - afo-repo-indexer-mcp-v002
          - contractor-v003-2-afo
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Resolve worker directory
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "worker=${{ github.event.inputs.worker }}" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-feed-discoverer-worker/'; then
            echo "worker=afo-feed-discoverer-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-podcast-inspector-worker/'; then
            echo "worker=afo-podcast-inspector-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-article-metadata-worker/'; then
            echo "worker=afo-article-metadata-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-sitemap-discovery-worker/'; then
            echo "worker=afo-sitemap-discovery-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-source-registry-worker/'; then
            echo "worker=afo-source-registry-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-trend-collector-worker/'; then
            echo "worker=afo-trend-collector-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-youtube-browser-capture-worker/'; then
            echo "worker=afo-youtube-browser-capture-worker" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-youtube-transcript-resilient-mcp/'; then
            echo "worker=afo-youtube-transcript-resilient-mcp" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-youtube-transcript-mcp-v2/'; then
            echo "worker=afo-youtube-transcript-mcp-v2" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-transcript-capture-mcp/'; then
            echo "worker=afo-transcript-capture-mcp" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-repo-change-ledger-mcp/'; then
            echo "worker=afo-repo-change-ledger-mcp" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/afo-repo-indexer-mcp-v002/'; then
            echo "worker=afo-repo-indexer-mcp-v002" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.head_commit.modified) }} ${{ toJson(github.event.head_commit.added) }}' | grep -q 'workers/contractor-v003-2-afo/'; then
            echo "worker=contractor-v003-2-afo" >> "$GITHUB_OUTPUT"
          else
            echo "worker=afo-youtube-transcript-resilient-mcp" >> "$GITHUB_OUTPUT"
          fi

      - name: Install worker dependencies
        working-directory: workers/${{ steps.resolve.outputs.worker }}
        shell: bash
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Deploy selected worker
        working-directory: workers/${{ steps.resolve.outputs.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
