name: Notion Ops Runner

on:
  push:
    paths:
      - 'spaces/notion-ops/queue.json'
  workflow_dispatch:

jobs:
  run-notion-op:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client

      - name: Run notion-op
        id: notion_op
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          node << 'EOF'
          const { Client } = require('@notionhq/client');
          const fs = require('fs');

          const notion = new Client({ auth: process.env.NOTION_API_KEY });
          const queue = JSON.parse(fs.readFileSync('spaces/notion-ops/queue.json', 'utf8'));

          async function queryRowByUrl(dbId, matchUrl) {
            const res = await notion.databases.query({
              database_id: dbId,
              filter: {
                property: 'GitHub URL',
                url: { equals: matchUrl }
              }
            });
            return res.results[0] || null;
          }

          async function runBatchRows(queue) {
            const results = [];
            for (const row of queue.rows) {
              try {
                const properties = {};
                for (const [key, val] of Object.entries(row)) {
                  if (key !== 'Name') properties[key] = val;
                }
                const res = await notion.pages.create({
                  parent: { database_id: queue.database_id },
                  properties: { ...{ Name: row.Name }, ...properties }
                });
                results.push({ name: row.Name?.title?.[0]?.text?.content, status: 'ok', id: res.id });
                console.log(`✅ Created: ${row.Name?.title?.[0]?.text?.content}`);
              } catch (err) {
                const name = row.Name?.title?.[0]?.text?.content;
                results.push({ name, status: 'error', error: err.message });
                console.error(`❌ Failed: ${name} — ${err.message}`);
              }
            }
            return results;
          }

          async function runPatchRows(queue) {
            const results = [];
            for (const row of queue.rows) {
              try {
                const page = await queryRowByUrl(queue.database_id, row.match);
                if (!page) {
                  console.warn(`⚠️ No match for: ${row.match}`);
                  results.push({ match: row.match, status: 'not_found' });
                  continue;
                }
                const patchProps = {};
                for (const [key, val] of Object.entries(row)) {
                  if (key !== 'match') patchProps[key] = val;
                }
                await notion.pages.update({
                  page_id: page.id,
                  properties: patchProps
                });
                results.push({ match: row.match, status: 'ok', id: page.id });
                console.log(`✅ Patched: ${row.match}`);
              } catch (err) {
                results.push({ match: row.match, status: 'error', error: err.message });
                console.error(`❌ Failed: ${row.match} — ${err.message}`);
              }
            }
            return results;
          }

          async function main() {
            console.log(`\n🚀 Running notion-op: ${queue.op}`);
            console.log(`   DB: ${queue.database_id}`);
            console.log(`   Rows: ${queue.rows.length}\n`);

            let results;
            if (queue.op === 'batch_rows') {
              results = await runBatchRows(queue);
            } else if (queue.op === 'patch_rows') {
              results = await runPatchRows(queue);
            } else {
              throw new Error(`Unknown op: ${queue.op}`);
            }

            const ok = results.filter(r => r.status === 'ok').length;
            const failed = results.filter(r => r.status === 'error').length;
            const skipped = results.filter(r => r.status === 'not_found').length;

            const result = {
              op: queue.op,
              database_id: queue.database_id,
              ran_at: new Date().toISOString(),
              requested_by: queue.requested_by || 'unknown',
              summary: { total: queue.rows.length, ok, failed, skipped },
              results
            };

            fs.writeFileSync('spaces/notion-ops/result.json', JSON.stringify(result, null, 2));
            console.log(`\n🏁 Done — ✅ ${ok} ok | ❌ ${failed} failed | ⚠️ ${skipped} skipped`);
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Commit result.json
        run: |
          git config user.name "notion-ops-runner"
          git config user.email "actions@github.com"
          git add spaces/notion-ops/result.json
          git diff --cached --quiet || git commit -m "chore(notion-ops): write result.json [skip ci]"
          git push
