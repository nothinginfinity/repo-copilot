name: Notion Ops

on:
  push:
    paths:
      - 'spaces/notion-ops/queue.json'

jobs:
  run-op:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Notion operation
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const https = require('https');

            const queue = JSON.parse(fs.readFileSync('spaces/notion-ops/queue.json', 'utf8'));
            const token = process.env.NOTION_TOKEN;

            function notionRequest(method, path, body) {
              return new Promise((resolve, reject) => {
                const data = body ? JSON.stringify(body) : null;
                const options = {
                  hostname: 'api.notion.com',
                  path: '/v1' + path,
                  method,
                  headers: {
                    'Authorization': 'Bearer ' + token,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json',
                    ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {})
                  }
                };
                const req = https.request(options, (res) => {
                  let raw = '';
                  res.on('data', chunk => raw += chunk);
                  res.on('end', () => resolve({ status: res.statusCode, body: JSON.parse(raw) }));
                });
                req.on('error', reject);
                if (data) req.write(data);
                req.end();
              });
            }

            let result = {
              op: queue.op,
              requested_by: queue.requested_by,
              completed_at: new Date().toISOString(),
              status: 'error',
              error: null
            };

            try {
              if (queue.op === 'search') {
                const res = await notionRequest('POST', '/search', {
                  query: queue.query || '',
                  filter: queue.filter || undefined,
                  page_size: queue.page_size || 20
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.results = res.body.results.map(r => ({
                    id: r.id,
                    object: r.object,
                    title: r.properties?.title?.title?.[0]?.plain_text
                          || r.properties?.Name?.title?.[0]?.plain_text
                          || r.title?.[0]?.plain_text
                          || '(untitled)',
                    url: r.url,
                    last_edited: r.last_edited_time
                  }));
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'create_page') {
                const res = await notionRequest('POST', '/pages', {
                  parent: queue.parent,
                  properties: queue.properties,
                  children: queue.children || []
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.page_id = res.body.id;
                  result.page_url = res.body.url;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'query_database') {
                const res = await notionRequest('POST', '/databases/' + queue.database_id + '/query', {
                  filter: queue.filter || undefined,
                  sorts: queue.sorts || undefined,
                  page_size: queue.page_size || 20
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.results = res.body.results;
                  result.has_more = res.body.has_more;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'update_block') {
                const res = await notionRequest('PATCH', '/blocks/' + queue.block_id, queue.block);
                if (res.status === 200) {
                  result.status = 'success';
                  result.block_id = res.body.id;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'get_page') {
                const res = await notionRequest('GET', '/pages/' + queue.page_id, null);
                if (res.status === 200) {
                  result.status = 'success';
                  result.page = res.body;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'list_databases') {
                const res = await notionRequest('POST', '/search', {
                  filter: { value: 'database', property: 'object' },
                  page_size: 20
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.databases = res.body.results.map(d => ({
                    id: d.id,
                    title: d.title?.[0]?.plain_text || '(untitled)',
                    url: d.url
                  }));
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'append_blocks') {
                const res = await notionRequest('PATCH', '/blocks/' + queue.block_id + '/children', {
                  children: queue.children
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.block_id = queue.block_id;
                  result.appended = res.body.results?.length || 0;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              // ── NEW: create_database ────────────────────────────────────────
              // Creates a new Notion database as a child of a page.
              // Required queue fields:
              //   parent_page_id: string  — page ID to nest the DB under
              //   title: string           — database title
              //   properties: object      — Notion property schema map
              // Returns: database_id, database_url
              } else if (queue.op === 'create_database') {
                const res = await notionRequest('POST', '/databases', {
                  parent: { type: 'page_id', page_id: queue.parent_page_id },
                  title: [{ type: 'text', text: { content: queue.title || 'Untitled Database' } }],
                  properties: queue.properties
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.database_id = res.body.id;
                  result.database_url = res.body.url;
                  result.title = queue.title;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              // ── NEW: append_row ─────────────────────────────────────────────
              // Inserts a new row (page) into an existing Notion database.
              // Required queue fields:
              //   database_id: string   — target database ID
              //   properties: object    — property values matching the DB schema
              // Optional:
              //   children: array       — block content for the page body
              // Returns: page_id, page_url
              } else if (queue.op === 'append_row') {
                const res = await notionRequest('POST', '/pages', {
                  parent: { type: 'database_id', database_id: queue.database_id },
                  properties: queue.properties,
                  children: queue.children || []
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.page_id = res.body.id;
                  result.page_url = res.body.url;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              // ── NEW: append_note ────────────────────────────────────────────
              // High-level convenience op for the Agent Notes DB (Path A).
              // Maps flat note fields directly to the Agent Notes schema.
              // Required queue fields:
              //   database_id: string       — Agent Notes database ID
              //   title: string             — note title / session summary
              // Optional queue fields:
              //   date: string              — ISO date (defaults to now)
              //   source: string            — 'Perplexity' | 'Claude' | 'ChatGPT' | 'Human'
              //   project: string           — project name
              //   new_concepts: string[]    — array of concept strings
              //   decisions: string         — decisions made this session
              //   open_questions: string    — open questions / next unknowns
              //   cid: string               — conversation ID (e.g. alice/c2/jared)
              //   gist_snapshot: string     — URL to a gist snapshot
              // Returns: page_id, page_url
              } else if (queue.op === 'append_note') {
                const noteDate = queue.date || new Date().toISOString().split('T')[0];
                const properties = {
                  'Title': {
                    title: [{ type: 'text', text: { content: queue.title || '(untitled note)' } }]
                  },
                  'Date': {
                    date: { start: noteDate }
                  }
                };
                if (queue.source) {
                  properties['Source'] = { select: { name: queue.source } };
                }
                if (queue.project) {
                  properties['Project'] = { rich_text: [{ type: 'text', text: { content: queue.project } }] };
                }
                if (Array.isArray(queue.new_concepts) && queue.new_concepts.length > 0) {
                  properties['New Concepts'] = { multi_select: queue.new_concepts.map(c => ({ name: c })) };
                }
                if (queue.decisions) {
                  properties['Decisions'] = { rich_text: [{ type: 'text', text: { content: queue.decisions } }] };
                }
                if (queue.open_questions) {
                  properties['Open Questions'] = { rich_text: [{ type: 'text', text: { content: queue.open_questions } }] };
                }
                if (queue.cid) {
                  properties['CID'] = { rich_text: [{ type: 'text', text: { content: queue.cid } }] };
                }
                if (queue.gist_snapshot) {
                  properties['Gist Snapshot'] = { url: queue.gist_snapshot };
                }
                const res = await notionRequest('POST', '/pages', {
                  parent: { type: 'database_id', database_id: queue.database_id },
                  properties
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.page_id = res.body.id;
                  result.page_url = res.body.url;
                  result.note_title = queue.title;
                  result.database_id = queue.database_id;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else {
                result.error = 'Unknown op: ' + queue.op;
              }
            } catch (e) {
              result.error = e.message;
            }

            fs.writeFileSync('spaces/notion-ops/result.json', JSON.stringify(result, null, 2));

      - name: Commit result
        run: |
          git config user.name "notion-ops[bot]"
          git config user.email "notion-ops@nothinginfinity.bot"
          git add spaces/notion-ops/result.json
          git diff --cached --quiet || git commit -m "chore(notion-ops): write result [skip ci]"
          git push
