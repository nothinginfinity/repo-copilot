name: Notion Ops

on:
  push:
    paths:
      - 'spaces/notion-ops/queue.json'

jobs:
  run-op:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Notion operation
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const https = require('https');

            const queue = JSON.parse(fs.readFileSync('spaces/notion-ops/queue.json', 'utf8'));
            const token = process.env.NOTION_TOKEN;

            function notionRequest(method, path, body) {
              return new Promise((resolve, reject) => {
                const data = body ? JSON.stringify(body) : null;
                const options = {
                  hostname: 'api.notion.com',
                  path: '/v1' + path,
                  method,
                  headers: {
                    'Authorization': 'Bearer ' + token,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json',
                    ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {})
                  }
                };
                const req = https.request(options, (res) => {
                  let body = '';
                  res.on('data', chunk => body += chunk);
                  res.on('end', () => resolve({ status: res.statusCode, body: JSON.parse(body) }));
                });
                req.on('error', reject);
                if (data) req.write(data);
                req.end();
              });
            }

            let result = {
              op: queue.op,
              requested_by: queue.requested_by,
              completed_at: new Date().toISOString(),
              status: 'error',
              error: null
            };

            try {
              if (queue.op === 'create_page') {
                const res = await notionRequest('POST', '/pages', {
                  parent: queue.parent,
                  properties: queue.properties,
                  children: queue.children || []
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.page_id = res.body.id;
                  result.page_url = res.body.url;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'query_database') {
                const res = await notionRequest('POST', '/databases/' + queue.database_id + '/query', {
                  filter: queue.filter || undefined,
                  sorts: queue.sorts || undefined,
                  page_size: queue.page_size || 20
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.results = res.body.results;
                  result.has_more = res.body.has_more;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'update_block') {
                const res = await notionRequest('PATCH', '/blocks/' + queue.block_id, queue.block);
                if (res.status === 200) {
                  result.status = 'success';
                  result.block_id = res.body.id;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'get_page') {
                const res = await notionRequest('GET', '/pages/' + queue.page_id, null);
                if (res.status === 200) {
                  result.status = 'success';
                  result.page = res.body;
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else if (queue.op === 'list_databases') {
                const res = await notionRequest('POST', '/search', {
                  filter: { value: 'database', property: 'object' },
                  page_size: 20
                });
                if (res.status === 200) {
                  result.status = 'success';
                  result.databases = res.body.results.map(d => ({
                    id: d.id,
                    title: d.title?.[0]?.plain_text || '(untitled)',
                    url: d.url
                  }));
                } else {
                  result.error = res.body.message || JSON.stringify(res.body);
                }

              } else {
                result.error = 'Unknown op: ' + queue.op;
              }
            } catch (e) {
              result.error = e.message;
            }

            fs.writeFileSync('spaces/notion-ops/result.json', JSON.stringify(result, null, 2));

      - name: Commit result
        run: |
          git config user.name "notion-ops[bot]"
          git config user.email "notion-ops@nothinginfinity.bot"
          git add spaces/notion-ops/result.json
          git diff --cached --quiet || git commit -m "chore(notion-ops): write result [skip ci]"
          git push
