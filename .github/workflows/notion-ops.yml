name: Notion Ops Runner

on:
  push:
    paths:
      - 'spaces/notion-ops/queue.json'
  workflow_dispatch:

jobs:
  run-notion-op:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run notion-op
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: bash .github/scripts/notion-ops-runner.sh
        continue-on-error: true

      - name: Commit result.json
        run: |
          git config user.name "notion-ops-runner"
          git config user.email "actions@github.com"
          git stash -- spaces/notion-ops/result.json || true
          git pull --rebase
          git stash pop || true
          git add spaces/notion-ops/result.json
          git diff --cached --quiet || git commit -m "chore(notion-ops): write result.json [skip ci]"
          git push

      - name: Assert success
        run: |
          STATUS=$(python3 -c "import json; r=json.load(open('spaces/notion-ops/result.json')); print(r.get('status','ok'))")
          echo "Final status: $STATUS"
          if [ "$STATUS" = "error" ]; then
            echo "Notion op reported an error - see result.json for details"
            exit 1
          fi
