name: Notion Ops Runner

on:
  push:
    paths:
      - 'spaces/notion-ops/queue.json'
  workflow_dispatch:

jobs:
  run-notion-op:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @notionhq/client
        run: |
          mkdir -p /tmp/notion-deps
          cd /tmp/notion-deps && npm init -y && npm install @notionhq/client

      - name: Run notion-op
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NODE_PATH: /tmp/notion-deps/node_modules
        run: node .github/scripts/notion-ops-runner.js
        continue-on-error: true

      - name: Commit result.json
        run: |
          git config user.name "notion-ops-runner"
          git config user.email "actions@github.com"
          # Stash result.json so git pull --rebase works cleanly
          git stash -- spaces/notion-ops/result.json || true
          git pull --rebase
          git stash pop || true
          git add spaces/notion-ops/result.json
          git diff --cached --quiet || git commit -m "chore(notion-ops): write result.json [skip ci]"
          git push

      - name: Assert success
        run: |
          STATUS=$(node -e "const r=require('./spaces/notion-ops/result.json'); console.log(r.status || 'ok');")
          echo "Final status: $STATUS"
          if [ "$STATUS" = "error" ]; then
            echo "Notion op reported an error - see result.json for details"
            exit 1
          fi
