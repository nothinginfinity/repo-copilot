name: Deploy Calitree Feed MCP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - workers/calitree-cannabis-feed-mcp/**
      - .github/workflows/deploy-calitree-cannabis-feed-mcp.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/calitree-cannabis-feed-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g wrangler
      - run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
