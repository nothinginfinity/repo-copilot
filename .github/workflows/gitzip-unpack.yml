# gitzip-unpack.yml
# Triggered by pushing a .gitzip bundle to the repo.
# Validates manifest, enforces path-safety rules, then writes each file.
# Required secret: GITZIP_DEPLOY_TOKEN (fine-grained PAT, contents:write, this repo only)

name: gitzip unpack

on:
  push:
    paths:
      - '**.gitzip'
  workflow_dispatch:
    inputs:
      bundle_path:
        description: 'Path to .gitzip bundle in the repo'
        required: true
        default: 'dist/repo-copilot.gitzip'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITZIP_DEPLOY_TOKEN }}
          fetch-depth: 1

      - name: Find bundle
        id: find
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bundle=${{ inputs.bundle_path }}" >> $GITHUB_OUTPUT
          else
            # Find the most-recently changed .gitzip file in this push
            BUNDLE=$(git diff --name-only HEAD~1 HEAD | grep '\.gitzip$' | head -n1)
            if [ -z "$BUNDLE" ]; then
              echo "No .gitzip file found in push. Exiting."
              exit 0
            fi
            echo "bundle=$BUNDLE" >> $GITHUB_OUTPUT
          fi

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate & unpack
        env:
          BUNDLE: ${{ steps.find.outputs.bundle }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const BUNDLE_PATH = process.env.BUNDLE;
          if (!BUNDLE_PATH) { console.log('No bundle path — skipping.'); process.exit(0); }

          // ── Security constants ──────────────────────────────────────────────
          const MAX_FILE_SIZE   = 5 * 1024 * 1024;  // 5 MB per file
          const MAX_BUNDLE_SIZE = 20 * 1024 * 1024; // 20 MB total bundle
          const BLOCKED_PATHS   = ['.git/', '.github/workflows/'];
          const ALLOW_WORKFLOWS = process.env.ALLOW_WORKFLOWS === 'true'; // override if needed

          // ── Load bundle ─────────────────────────────────────────────────────
          const raw = fs.readFileSync(BUNDLE_PATH, 'utf8');
          let bundle;
          try { bundle = JSON.parse(raw); } catch (e) {
            console.error('Invalid JSON bundle:', e.message); process.exit(1);
          }

          const { manifest, files } = bundle;
          if (!manifest || !files) {
            console.error('Bundle missing manifest or files field.'); process.exit(1);
          }

          console.log(`Bundle: ${manifest.name || 'unnamed'} v${manifest.version || '?'} (${manifest.created || 'unknown date'})`);
          console.log(`Files: ${Object.keys(files).length}`);

          let totalSize = 0;
          const written = [];

          for (const [dest, entry] of Object.entries(files)) {
            // ── Path safety checks ──────────────────────────────────────────
            if (path.isAbsolute(dest)) {
              console.error(`BLOCKED absolute path: ${dest}`); process.exit(1);
            }
            const normalized = path.normalize(dest);
            if (normalized.startsWith('..')) {
              console.error(`BLOCKED path traversal: ${dest}`); process.exit(1);
            }
            const isWorkflowPath = normalized.startsWith('.github/workflows/');
            if (isWorkflowPath && !ALLOW_WORKFLOWS) {
              console.error(`BLOCKED workflow path (set ALLOW_WORKFLOWS=true to permit): ${dest}`);
              process.exit(1);
            }
            for (const blocked of BLOCKED_PATHS) {
              if (!isWorkflowPath && normalized.startsWith(blocked)) {
                console.error(`BLOCKED protected path: ${dest}`); process.exit(1);
              }
            }

            // ── Decode content ──────────────────────────────────────────────
            const content = Buffer.from(entry.content, 'base64');

            // ── Size guard ──────────────────────────────────────────────────
            if (content.length > MAX_FILE_SIZE) {
              console.error(`BLOCKED oversized file (${content.length} bytes): ${dest}`); process.exit(1);
            }
            totalSize += content.length;
            if (totalSize > MAX_BUNDLE_SIZE) {
              console.error(`BLOCKED bundle exceeds max size (${MAX_BUNDLE_SIZE} bytes total).`); process.exit(1);
            }

            // ── SHA-256 integrity check ─────────────────────────────────────
            if (entry.sha256) {
              const actual = crypto.createHash('sha256').update(content).digest('hex');
              if (actual !== entry.sha256) {
                console.error(`INTEGRITY FAIL — sha256 mismatch for ${dest}`);
                console.error(`  expected: ${entry.sha256}`);
                console.error(`  actual:   ${actual}`);
                process.exit(1);
              }
            }

            // ── Write file ──────────────────────────────────────────────────
            const dir = path.dirname(normalized);
            if (dir && dir !== '.') fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(normalized, content);
            written.push(dest);
            console.log(`  ✓ ${dest} (${content.length} bytes)`);
          }

          console.log(`\nUnpacked ${written.length} file(s) successfully.`);
          EOF

      - name: Commit unpacked files
        run: |
          git config user.name  "gitzip-bot"
          git config user.email "gitzip-bot@noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — bundle produced no file changes."
          else
            BUNDLE_NAME=$(basename "${{ steps.find.outputs.bundle }}")
            git commit -m "gitzip-unpack: deploy from $BUNDLE_NAME [skip ci]"
            git push
          fi
