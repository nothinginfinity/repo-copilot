name: gitzip unpack

on:
  push:
    paths:
      - '.gitzip/**'

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Unpack all .zip files in .gitzip/
        run: |
          set -e
          shopt -s nullglob
          zips=(.gitzip/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No zip files found in .gitzip/ — nothing to do."
            exit 0
          fi
          for zipfile in "${zips[@]}"; do
            echo "Unpacking $zipfile..."
            # Unzip into repo root, overwriting existing files
            unzip -o "$zipfile" -d .
            echo "Done: $zipfile"
          done

      - name: Commit unpacked files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "gitzip: auto-unpack from .gitzip/ [skip ci]"
            git push
          fi
