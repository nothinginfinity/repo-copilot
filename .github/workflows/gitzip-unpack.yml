name: gitzip-unpack

# Triggers whenever a drop-*.zip is pushed to .gitzip/ on any branch.
# This is the self-deploy rail: agents (or humans) push a .zip bundle
# and this workflow validates, unpacks, commits, and cleans up.

on:
  push:
    paths:
      - '.gitzip/drop-*.zip'

# Only one unpack run at a time per branch — prevent race conditions.
concurrency:
  group: gitzip-unpack-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unpack:
    name: Validate & Unpack gitzip bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit deployed files back

    steps:
      # ── 1. Checkout full history so we can commit back ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Node (matches validate-and-unpack.js shebang) ───────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Validate & unpack all drop-*.zip files ───────────────────────────
      - name: Run gitzip validate-and-unpack
        id: unpack
        run: |
          node .gitzip/validate-and-unpack.js --summary
          echo "summary_written=true" >> $GITHUB_OUTPUT

      # ── 4. Write step summary to GitHub Actions UI ──────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ -f /tmp/gitzip-summary.md ]; then
            cat /tmp/gitzip-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      # ── 5. Commit deployed files back to branch ─────────────────────────────
      #    Excludes .gitzip/drop-*.zip so processed zips aren't re-committed.
      - name: Commit deployed files
        run: |
          git config user.name  "gitzip-bot"
          git config user.email "gitzip-bot@nothinginfinity"

          # Stage everything except the zip files themselves
          git add --all
          git reset -- '.gitzip/drop-*.zip' 2>/dev/null || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No file changes to commit — nothing deployed."
          else
            COMMIT_MSG=$(node -e "
              const fs = require('fs');
              const drops = fs.readdirSync('.gitzip').filter(f => f.startsWith('drop-') && f.endsWith('.zip'));
              const label = drops.length > 0 ? drops.join(', ') : 'gitzip drop';
              console.log('gitzip-deploy: ' + label);
            ")
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ Committed and pushed deployed files."
          fi

      # ── 6. Remove processed zip files ───────────────────────────────────────
      #    Zips are ephemeral — they trigger the deploy but don't live in history.
      - name: Clean up processed zips
        run: |
          git config user.name  "gitzip-bot"
          git config user.email "gitzip-bot@nothinginfinity"

          ZIPS=$(find .gitzip -name 'drop-*.zip' 2>/dev/null)
          if [ -z "$ZIPS" ]; then
            echo "No zips to clean up."
            exit 0
          fi

          for zip in $ZIPS; do
            git rm -f "$zip"
            echo "  Removed: $zip"
          done

          git commit -m "gitzip-cleanup: remove processed drop zips"
          git push
          echo "✅ Cleanup complete."
