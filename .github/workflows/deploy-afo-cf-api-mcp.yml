name: Deploy AFO CF API MCP

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-afo-cf-api-mcp.yml
      - apps/afo-cloudflare-api-mcp/**

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy afo-cloudflare-api-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Worker
        shell: bash
        run: npx wrangler@latest deploy --config apps/afo-cloudflare-api-mcp/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
