name: AFO Micro Mail Worker

on:
  workflow_dispatch:
    inputs:
      setup_resources:
        description: Create or reuse Cloudflare resources
        required: true
        default: true
        type: boolean
      commit_wrangler_ids:
        description: Commit resolved D1 and KV IDs back to wrangler.jsonc
        required: true
        default: true
        type: boolean
      apply_schema:
        description: Apply D1 schema before deploy
        required: true
        default: true
        type: boolean
      smoke_test:
        description: Run wrangler deploy dry run before deploy
        required: true
        default: true
        type: boolean
      deploy_worker:
        description: Deploy the Worker
        required: true
        default: true
        type: boolean
      mail_domain:
        description: Mail domain for the Worker vars
        required: true
        default: example.com
        type: string
      message_os_ingest_url:
        description: Message OS ingest endpoint URL. Leave blank to disable bridge.
        required: false
        default: ''
        type: string
      message_os_target_user:
        description: Message OS target user for inbound mail notifications
        required: true
        default: jared
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_DIR: workers/afo-micro-mail-worker
      D1_NAME: afo-micro-mail-db
      KV_TITLE: afo-micro-mail-kv
      R2_BUCKET: afo-micro-mail
      VECTORIZE_INDEX: afo-micro-mail-vectors
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MESSAGE_OS_TOKEN: ${{ secrets.MESSAGE_OS_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node and Wrangler
        working-directory: ${{ env.WORKER_DIR }}
        run: |
          node --version
          npm install
          npx wrangler --version

      - name: Verify Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Create or reuse Cloudflare resources
        id: resources
        if: ${{ inputs.setup_resources }}
        working-directory: ${{ env.WORKER_DIR }}
        run: |
          set -e
          D1_ID=$(npx wrangler d1 list | grep "$D1_NAME" | grep -Eo '[0-9a-fA-F-]{36}' | head -n 1 || true)
          if [ -z "$D1_ID" ]; then
            npx wrangler d1 create "$D1_NAME" | tee /tmp/d1.txt
            D1_ID=$(grep -Eo '[0-9a-fA-F-]{36}' /tmp/d1.txt | head -n 1 || true)
          fi
          if [ -z "$D1_ID" ]; then
            echo "Could not resolve D1 database ID" >&2
            exit 1
          fi
          echo "d1_id=$D1_ID" >> "$GITHUB_OUTPUT"

          KV_ID=$(curl -sS -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s||'{}');const a=j.result||[];const x=a.find(i=>i.title===process.env.KV_TITLE);if(x)process.stdout.write(x.id||'')})")
          if [ -z "$KV_ID" ]; then
            KV_ID=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"title\":\"${KV_TITLE}\"}" \
              | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s||'{}');if(!j.success){console.error(JSON.stringify(j.errors||j));process.exit(1)}process.stdout.write(j.result.id||'')})")
          fi
          if [ -z "$KV_ID" ]; then
            echo "Could not resolve KV namespace ID" >&2
            exit 1
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

          npx wrangler r2 bucket list | grep -q "$R2_BUCKET" || npx wrangler r2 bucket create "$R2_BUCKET"
          npx wrangler vectorize list | grep -q "$VECTORIZE_INDEX" || npx wrangler vectorize create "$VECTORIZE_INDEX" --dimensions=768 --metric=cosine

      - name: Patch wrangler.jsonc
        if: ${{ inputs.setup_resources }}
        working-directory: ${{ env.WORKER_DIR }}
        env:
          D1_ID: ${{ steps.resources.outputs.d1_id }}
          KV_ID: ${{ steps.resources.outputs.kv_id }}
          MAIL_DOMAIN: ${{ inputs.mail_domain }}
          MESSAGE_OS_INGEST_URL: ${{ inputs.message_os_ingest_url }}
          MESSAGE_OS_TARGET_USER: ${{ inputs.message_os_target_user }}
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const c=JSON.parse(fs.readFileSync('wrangler.jsonc','utf8'));
          c.d1_databases=[{binding:'DB',database_name:process.env.D1_NAME,database_id:process.env.D1_ID}];
          c.kv_namespaces=[{binding:'MAIL_KV',id:process.env.KV_ID}];
          c.r2_buckets=[{binding:'MAIL_R2',bucket_name:process.env.R2_BUCKET}];
          c.vectorize=[{binding:'MAIL_VECTORIZE',index_name:process.env.VECTORIZE_INDEX}];
          c.vars=c.vars||{};
          c.vars.MAIL_DOMAIN=process.env.MAIL_DOMAIN;
          c.vars.DEFAULT_TTL_SECONDS=c.vars.DEFAULT_TTL_SECONDS||'604800';
          c.vars.EMBEDDING_MODEL=c.vars.EMBEDDING_MODEL||'@cf/baai/bge-base-en-v1.5';
          c.vars.SUMMARY_MODEL=c.vars.SUMMARY_MODEL||'@cf/meta/llama-3.1-8b-instruct';
          c.vars.MESSAGE_OS_INGEST_URL=process.env.MESSAGE_OS_INGEST_URL||'';
          c.vars.MESSAGE_OS_TARGET_USER=process.env.MESSAGE_OS_TARGET_USER||'jared';
          c.vars.MESSAGE_OS_BRIDGE_MODE='notify';
          c.vars.MESSAGE_OS_BODY_LIMIT=c.vars.MESSAGE_OS_BODY_LIMIT||'6000';
          fs.writeFileSync('wrangler.jsonc',JSON.stringify(c,null,2)+'\n');
          NODE

      - name: Set Message OS token secret
        if: ${{ env.MESSAGE_OS_TOKEN != '' }}
        working-directory: ${{ env.WORKER_DIR }}
        run: |
          printf '%s' "$MESSAGE_OS_TOKEN" | npx wrangler secret put MESSAGE_OS_TOKEN

      - name: Commit resolved wrangler.jsonc
        if: ${{ inputs.setup_resources && inputs.commit_wrangler_ids }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$WORKER_DIR/wrangler.jsonc"
          git diff --cached --quiet || (git commit -m "Update AFO micro mail Worker Cloudflare bindings" && git push)

      - name: Apply D1 schema
        if: ${{ inputs.apply_schema }}
        working-directory: ${{ env.WORKER_DIR }}
        run: npx wrangler d1 execute "$D1_NAME" --file=./schema.sql --remote

      - name: Dry run deploy
        if: ${{ inputs.smoke_test }}
        working-directory: ${{ env.WORKER_DIR }}
        run: npx wrangler deploy --dry-run

      - name: Deploy Worker
        if: ${{ inputs.deploy_worker }}
        working-directory: ${{ env.WORKER_DIR }}
        run: npx wrangler deploy
