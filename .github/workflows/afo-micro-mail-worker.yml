name: AFO Micro Mail Worker

on:
  workflow_dispatch:
    inputs:
      apply_schema:
        description: 'Apply D1 schema before deploy'
        required: true
        default: true
        type: boolean
      deploy_worker:
        description: 'Deploy the Worker after setup'
        required: true
        default: true
        type: boolean
      smoke_test:
        description: 'Run a local Wrangler dry-run style check before deploy'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    name: Setup and deploy AFO Micro Mail Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/afo-micro-mail-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Show Wrangler version
        run: npx wrangler --version

      - name: Apply D1 schema
        if: ${{ inputs.apply_schema }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute afo-micro-mail-db --file=./schema.sql --remote

      - name: Validate deploy config
        if: ${{ inputs.smoke_test }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

      - name: Deploy Worker
        if: ${{ inputs.deploy_worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
