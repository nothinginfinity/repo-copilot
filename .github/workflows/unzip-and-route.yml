name: Unzip and Route Turn Bundle

on:
  push:
    paths:
      - '.github/turn-bundles/**'

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest zip bundle
        id: find_zip
        run: |
          if [ ! -d ".github/turn-bundles" ]; then
            echo "turn-bundles dir absent — no-op."
            echo "zip=" >> $GITHUB_OUTPUT
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          ZIP=$(find .github/turn-bundles -name '*.zip' | sort | tail -1 || true)
          if [ -z "$ZIP" ]; then
            echo "No zip bundle found — no-op."
            echo "zip=" >> $GITHUB_OUTPUT
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Found bundle: $ZIP"
            echo "zip=$ZIP" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no bundle
        if: steps.find_zip.outputs.skip == 'true'
        run: echo "⏭️  No turn bundle — workflow complete (no-op)."

      - name: Unzip bundle
        if: steps.find_zip.outputs.skip == 'false'
        run: |
          mkdir -p /tmp/turn-bundle
          unzip -o "${{ steps.find_zip.outputs.zip }}" -d /tmp/turn-bundle
          echo "Bundle contents:"
          find /tmp/turn-bundle -type f

      - name: Route files into repo
        if: steps.find_zip.outputs.skip == 'false'
        run: |
          cd /tmp/turn-bundle

          if [ -d turns ]; then
            cp -r turns/. "$GITHUB_WORKSPACE/.github/turns/"
            echo "✅ Routed turns/"
          fi

          if [ -d spaces ]; then
            find spaces -type f | while read f; do
              dest="$GITHUB_WORKSPACE/$f"
              mkdir -p "$(dirname $dest)"
              if [ -f "$dest" ]; then
                incoming_hash=$(sha256sum "$f" | cut -d' ' -f1)
                existing_hash=$(sha256sum "$dest" | cut -d' ' -f1)
                if [ "$incoming_hash" != "$existing_hash" ]; then
                  cp "$f" "$dest"
                  echo "✅ Updated $f"
                else
                  echo "⏭️  Skipped (identical): $f"
                fi
              else
                cp "$f" "$dest"
                echo "✅ Created $f"
              fi
            done
          fi

          if [ -d .github/notion-ops-queue ]; then
            cp -r .github/notion-ops-queue/. "$GITHUB_WORKSPACE/.github/notion-ops-queue/"
            echo "✅ Routed notion-ops-queue"
          fi

      - name: Route inbox messages by to: header
        if: steps.find_zip.outputs.skip == 'false'
        run: |
          python3 - <<'EOF'
          import re, os

          INBOX = "spaces/alice/inbox.md"
          ROUTES = {
              "alice-ops": "spaces/alice/inbox-ops.md",
              "alice-review": "spaces/alice/inbox-review.md",
          }

          if not os.path.exists(INBOX):
              print("⏭️  inbox.md not found, skipping routing")
              exit(0)

          with open(INBOX, "r") as f:
              content = f.read()

          messages = re.split(r'(?=^## 📩)', content, flags=re.MULTILINE)
          master_messages = []

          for msg in messages:
              to_match = re.search(r'\*\*to:\*\*\s*(\S+)', msg)
              recipient = to_match.group(1).strip() if to_match else "alice"

              if recipient in ROUTES:
                  target = ROUTES[recipient]
                  os.makedirs(os.path.dirname(target), exist_ok=True)
                  with open(target, "a") as f:
                      f.write(msg)
                  print(f"✅ Routed message to {target}")
              else:
                  master_messages.append(msg)

          header = "# Alice — Inbox\n\n> Messages not addressed to a sub-agent land here.\n> Alice reads this file for unrouted tasks.\n\n<!-- messages appear below this line -->\n\n---\n"
          with open(INBOX, "w") as f:
              f.write(header + "".join(master_messages))
          print("✅ Master inbox rewritten with unrouted messages only")
          EOF

      - name: Assemble transcript for session
        if: steps.find_zip.outputs.skip == 'false'
        run: |
          find "$GITHUB_WORKSPACE/.github/turns" -name 'turn.json' | sort | while read f; do
            SESSION=$(echo $f | grep -oP '(?<=turns/).*(?=/[^/]+/turn.json)')
            CID=$(echo $f | grep -oP '(?<=/)[^/]+(?=/turn.json)')
            TRANSCRIPT_DIR="$GITHUB_WORKSPACE/spaces/conversations/$SESSION"
            mkdir -p "$TRANSCRIPT_DIR"
            TRANSCRIPT="$TRANSCRIPT_DIR/transcript.md"
            if ! grep -q "## $CID" "$TRANSCRIPT" 2>/dev/null; then
              echo "" >> "$TRANSCRIPT"
              echo "## $CID" >> "$TRANSCRIPT"
              echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> "$TRANSCRIPT"
              echo "" >> "$TRANSCRIPT"
              Q=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('q_summary',''))")
              A=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('a_summary',''))")
              echo "**Q:** $Q" >> "$TRANSCRIPT"
              echo "" >> "$TRANSCRIPT"
              echo "**A:** $A" >> "$TRANSCRIPT"
              echo "" >> "$TRANSCRIPT"
              echo "---" >> "$TRANSCRIPT"
              echo "✅ Appended $CID to $SESSION transcript"
            else
              echo "⏭️  $CID already in transcript"
            fi
          done

      - name: Push brain note to Agent Notes DB
        if: steps.find_zip.outputs.skip == 'false'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          BRAIN_DB: 35bd927c-9792-81b9-816a-e357c9339d2f
        run: |
          LATEST=$(find "$GITHUB_WORKSPACE/.github/turns" -name 'turn.json' | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No turn.json found, skipping brain push"
            exit 0
          fi
          CID=$(python3 -c "import json; d=json.load(open('$LATEST')); print(d.get('cid','unknown'))")
          TITLE=$(python3 -c "import json; d=json.load(open('$LATEST')); print(d.get('title','Turn note'))")
          SOURCE=$(python3 -c "import json; d=json.load(open('$LATEST')); print(d.get('source','perplexity'))")
          SUMMARY=$(python3 -c "import json; d=json.load(open('$LATEST')); print(d.get('a_summary',''))")
          python3 - <<EOF
          import urllib.request, json, os
          token = os.environ['NOTION_TOKEN']
          db = os.environ['BRAIN_DB']
          payload = {
            "parent": {"database_id": db},
            "properties": {
              "Name": {"title": [{"text": {"content": "$TITLE"}}]},
              "CID": {"rich_text": [{"text": {"content": "$CID"}}]},
              "Source": {"rich_text": [{"text": {"content": "$SOURCE"}}]},
              "Summary": {"rich_text": [{"text": {"content": "$SUMMARY"[:1800]}}]}
            }
          }
          req = urllib.request.Request(
            'https://api.notion.com/v1/pages',
            data=json.dumps(payload).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
            },
            method='POST'
          )
          res = urllib.request.urlopen(req)
          print('✅ Brain note pushed:', res.status)
          EOF

      - name: Commit routed files
        if: steps.find_zip.outputs.skip == 'false'
        run: |
          git config user.name "repo-copilot[bot]"
          git config user.email "repo-copilot@nothinginfinity.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: route turn bundle $(date -u +"%Y-%m-%dT%H:%M")"
          git push
          echo "✅ Routed files committed"
