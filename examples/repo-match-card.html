<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Match Card — ContextFrame</title>
  <style>
    /* Self-contained ContextFrame artifact — no external deps */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1c1b19;
      --surface:     #252422;
      --surface-2:   #2d2c2a;
      --border:      #393836;
      --text:        #cdccca;
      --text-muted:  #797876;
      --accent:      #4f98a3;
      --accent-dim:  #313b3b;
      --success:     #6daa45;
      --radius:      0.75rem;
      --font:        system-ui, -apple-system, sans-serif;
    }

    html, body {
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      height: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      cursor: pointer;
      transition: border-color 160ms ease, box-shadow 160ms ease;
      height: 100%;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }
    .card:active { opacity: 0.85; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-icon {
      width: 28px; height: 28px;
      background: var(--accent-dim);
      border-radius: 0.375rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { color: var(--accent); }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title span { color: var(--text-muted); font-weight: 400; }

    .card-desc {
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: auto;
    }
    .chip {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 0.1875rem 0.5rem;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .chip.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: transparent;
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 0.25rem;
      height: 0.875em;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton .card-title, .skeleton .card-desc { visibility: hidden; }
    .skeleton .card-title::after {
      content: '';
      display: block;
      width: 55%;
      height: 0.875em;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 0.25rem;
      margin-top: 0.125em;
    }
  </style>
</head>
<body>

<div class="card" id="card" role="button" tabindex="0" aria-label="Repository match card">
  <div class="card-header">
    <div class="card-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 3h18v18H3z" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
    </div>
    <div class="card-title">
      <span id="owner">owner</span>/<span id="name">repo-name</span>
    </div>
  </div>
  <div class="card-desc" id="desc">Loading repository information…</div>
  <div class="card-meta">
    <span class="chip active" id="role">orchestrator</span>
    <span class="chip" id="lang">HTML</span>
    <span class="chip" id="status">active</span>
  </div>
</div>

<script src="../runtime/context-frame-player.js"></script>
<script>
  const el = {
    owner:  document.getElementById('owner'),
    name:   document.getElementById('name'),
    desc:   document.getElementById('desc'),
    role:   document.getElementById('role'),
    lang:   document.getElementById('lang'),
    status: document.getElementById('status'),
    card:   document.getElementById('card')
  };

  function render(data) {
    if (!data) return;
    const [owner, name] = (data.repo || 'owner/repo').split('/');
    el.owner.textContent  = owner || 'owner';
    el.name.textContent   = name  || 'repo';
    el.desc.textContent   = data.description || 'No description provided.';
    el.role.textContent   = data.role         || 'member';
    el.lang.textContent   = data.language     || 'HTML';
    el.status.textContent = data.status       || 'active';
    el.card.setAttribute('aria-label', `Repository: ${data.repo}`);
  }

  // Wire up click / keyboard
  function handleActivate() {
    ContextFrame.emit('action', {
      type:  'card-clicked',
      repo:  el.owner.textContent + '/' + el.name.textContent
    });
  }
  el.card.addEventListener('click', handleActivate);
  el.card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleActivate(); }
  });

  // Announce to host and listen for update commands
  ContextFrame.ready({
    id:           'repo-match-card',
    version:      '0.1.0',
    capabilities: ['render', 'action:card-clicked']
  });

  ContextFrame.on('update', render);
  ContextFrame.on('reset',  () => render(null));

  // Seed with default data if running standalone (not in a host)
  if (window.self === window.top) {
    render({
      repo:        'nothinginfinity/repo-copilot',
      description: 'Orchestration layer for a multi-agent, HTML-native software deployment system.',
      role:        'orchestrator',
      language:    'HTML',
      status:      'active'
    });
  }
</script>
</body>
</html>
